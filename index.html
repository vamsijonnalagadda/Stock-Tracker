<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Talk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0c0f18;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 18px 12px 60px;
    }

    .page { width: 100%; max-width: none; margin: 0; }

    /* ── Market Ticker Bar ── */
    .market-ticker-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      background: #0b1018;
      border: 1px solid #1e293b;
      border-radius: 14px;
      padding: 10px 18px;
      margin-bottom: 14px;
      align-items: center;
    }
    .mkt-item {
      display: inline-flex;
      align-items: baseline;
      gap: 5px;
      font-size: 0.82rem;
      white-space: nowrap;
    }
    .mkt-label { color: #64748b; font-weight: 600; letter-spacing: 0.02em; }
    .mkt-price { color: #e2e8f0; font-weight: 700; font-variant-numeric: tabular-nums; }
    .mkt-chg.up   { color: #34d399; }
    .mkt-chg.down { color: #f87171; }
    .mkt-chg.flat { color: #64748b; }
    .after-hours-badge { font-size: 0.95rem; color: #94a3b8; background: rgba(255,255,255,0.04); padding: 5px 12px; border-radius: 999px; display:inline-flex; align-items:center; gap:5px; border:1px solid rgba(255,255,255,0.07); }
    .after-hours-value.up { color: #34d399; font-weight:700; }
    .after-hours-value.down { color: #f87171; font-weight:700; }
    .after-hours-value.flat { color: #94a3b8; font-weight:700; }
    .mkt-sep { color: #1e293b; font-size: 0.9rem; user-select: none; }
    /* ── Market group pill buttons ── */
    .market-groups { display:flex; gap:8px; flex-wrap:wrap; align-items:center; width:100%; }
    .market-group-btn { padding:5px 12px; border-radius:999px; border:1.5px solid #1e293b; background:#0f1724; color:#94a3b8; font-size:0.72rem; font-weight:800; text-transform:uppercase; letter-spacing:0.07em; cursor:pointer; transition:all .18s; white-space:nowrap; }
    .market-group-btn:hover { border-color:#4f46e5; color:#c7d2fe; }
    .market-group-btn.active { background:linear-gradient(135deg,#4f46e5,#06b6d4); border-color:transparent; color:#fff; box-shadow:0 4px 16px rgba(79,70,229,0.3); }
    /* Shared content area below group buttons */
    .market-content-area { display:none; margin-top:8px; padding:10px 12px; background:#0b1018; border:1px solid #1e293b; border-radius:12px; }
    .market-content-area.visible { display:flex; flex-wrap:wrap; gap:6px 20px; }
    /* Compact row for each index inside content area */
    .market-row { display:inline-flex; align-items:center; gap:8px; padding:4px 8px; border-radius:8px; transition:background .12s; min-width:140px; }
    .market-row:hover { background:rgba(255,255,255,0.03); }
    .market-cell-label { color:#94a3b8; font-weight:700; font-size:0.76rem; min-width:60px; }
    .market-cell-price { color:#e2e8f0; font-weight:800; font-variant-numeric:tabular-nums; font-size:0.82rem; }
    .market-cell-chg { font-weight:700; font-size:0.76rem; min-width:70px; text-align:right; }

    /* ── Search bar ── */
    .search-wrap { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; }
    .search-wrap input {
      flex: 1 1 260px;
      padding: 13px 18px;
      border-radius: 14px;
      border: 1.5px solid #1e293b;
      background: #111827;
      color: #f1f5f9;
      font-size: 1rem;
      outline: none;
      transition: border-color .18s;
    }
    .search-wrap input:focus { border-color: #6366f1; }
    .search-wrap input::placeholder { color: #334155; }
    #fetchBtn {
      padding: 13px 28px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #6366f1 0%, #06b6d4 100%);
      color: #fff;
      font-weight: 700;
      font-size: 0.96rem;
      cursor: pointer;
      transition: opacity .18s, transform .12s;
      box-shadow: 0 6px 24px rgba(99,102,241,0.35);
    }
    #fetchBtn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    #fetchBtn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Sentiment UI */
    .sent-row { padding:8px 10px; border-radius:8px; background:rgba(255,255,255,0.02); display:flex; justify-content:space-between; gap:8px; align-items:center; }
    .sent-row strong { font-weight:800; font-size:0.9rem; }
    .sent-emoji { font-size:1.1rem; margin-left:6px }
    .sent-subrow { padding:6px 12px; color:#9aa7b9; font-size:0.86rem; border-left:2px solid rgba(255,255,255,0.03); margin:6px 0 6px 0; }
    .delta-up { color: #34d399; font-weight:700; }
    .delta-down { color: #f87171; font-weight:700; }
    .delta-neutral { color: #94a3b8; font-weight:700; }

    /* ── Price card ── */
    .price-card {
      background: linear-gradient(145deg, #111827 0%, #0f1629 100%);
      border: 1px solid #1e293b;
      border-radius: 22px;
      padding: 26px 28px 22px;
      margin-bottom: 16px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    }
    .company-name {
      font-size: 0.82rem; font-weight: 700; color: #7eb8e8;
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .company-name .ticker-sym {
      color: #f0f6ff; font-size: 1rem; font-weight: 900; letter-spacing: 0.05em;
    }
    .company-name .name-sep { color: #334155; }
    .price-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .price-big { font-size: 56px; font-weight: 900; letter-spacing: -0.045em; line-height: 1; color: #f8fafc; }
    .pct-badge {
      font-size: 1rem; font-weight: 700;
      padding: 5px 15px; border-radius: 999px;
      display: inline-flex; align-items: center; gap: 3px;
    }
    .pct-positive { color: #34d399; background: rgba(52,211,153,0.12); border: 1px solid rgba(52,211,153,0.2); }
    .pct-negative { color: #f87171; background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.18); }
    .pct-neutral  { color: #64748b; background: rgba(100,116,139,0.1); border: 1px solid rgba(100,116,139,0.15); }
    .price-meta {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 10px;
    }
    .meta-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.82rem;
    }
    .meta-chip .meta-label { color: #7e95b0; font-weight: 600; white-space: nowrap; }
    .meta-chip .meta-value { color: #e2eaf4; font-weight: 800; white-space: nowrap; }
    .meta-chip .meta-high  { color: #34d399; font-weight: 800; }
    .meta-chip .meta-low   { color: #f87171; font-weight: 800; }

    /* ── Tab pill buttons ── */
    .tabs-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .tab-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border-radius: 999px;
      border: 1.5px solid #1e293b;
      background: #111827;
      color: #64748b;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all .2s ease;
      white-space: nowrap;
      user-select: none;
      letter-spacing: 0.01em;
    }
    .tab-icon { font-size: 0.95rem; }
    .tab-btn:hover {
      border-color: #4f46e5;
      color: #c7d2fe;
      background: #13163a;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79,70,229,0.18);
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 8px 28px rgba(79,70,229,0.38);
      transform: translateY(-2px);
    }

    /* ── Tab content area ── */
    .panel-inner-overflow { overflow: hidden; }
    .panel-inner {
      background: #111827;
      border: 1.5px solid #1e293b;
      border-radius: 18px;
      padding: 22px 22px 20px;
      margin-top: 4px;
    }
    .panel-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: #4f46e5;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 16px;
    }

    /* ── Metric grid ── */
    .grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    }
    .metric {
      background: #0d1117;
      border: 1px solid #1e293b;
      border-radius: 13px;
      padding: 13px 15px;
      transition: border-color .18s, transform .15s;
    }
    .metric:hover { border-color: #334155; transform: translateY(-1px); }
    .m-label { font-size: 0.7rem; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
    .m-value { font-size: 1rem; font-weight: 700; color: #f1f5f9; }

    /* ── JSON pre ── */
    pre {
      background: #080b11;
      border: 1px solid #1e293b;
      border-radius: 13px;
      padding: 16px;
      overflow: auto;
      font-size: 0.8rem;
      color: #64748b;
      line-height: 1.65;
    }

    .news-list { display: grid; gap: 10px; margin-bottom: 14px; }
    .news-item {
      display: block;
      padding: 12px 14px;
      border: 1px solid #1e293b;
      border-radius: 12px;
      background: #0b1018;
      text-decoration: none;
      transition: border-color .18s, transform .15s;
    }
    .news-item:hover { border-color: #334155; transform: translateY(-1px); }
    .news-title { color: #dbeafe; font-size: 0.9rem; font-weight: 600; line-height: 1.4; margin-bottom: 5px; }
    .news-meta { color: #64748b; font-size: 0.78rem; }

    .headline-bar {
      position: relative;
      overflow: hidden;
      border: 1px solid #1e293b;
      border-radius: 12px;
      background: #0b1018;
      margin-bottom: 12px;
      padding: 10px 0;
    }
    .headline-bar::before,
    .headline-bar::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 64px;
      z-index: 2;
      pointer-events: none;
    }
    .headline-bar::before {
      left: 0;
      background: linear-gradient(90deg, #0b1018 0%, rgba(11, 16, 24, 0) 100%);
    }
    .headline-bar::after {
      right: 0;
      background: linear-gradient(270deg, #0b1018 0%, rgba(11, 16, 24, 0) 100%);
    }
    .headline-track {
      display: inline-flex;
      gap: 28px;
      white-space: nowrap;
      padding-left: 100%;
      animation: headline-scroll 191.25s linear infinite;
      will-change: transform;
    }
    /* Controls and unified grid */

    .headline-bar:hover .headline-track { animation-play-state: paused; }
    .headline-item {
      color: #cbd5e1;
      font-size: 0.83rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .headline-item:hover { color: #e2e8f0; }
    .headline-source {
      color: #38bdf8;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .headline-time { color: #64748b; }

    .social-trending-strip {
      border: 1px solid #1e293b;
      border-radius: 14px;
      background: linear-gradient(135deg, #0a1324 0%, #101a30 55%, #0f2232 100%);
      margin-bottom: 14px;
      padding: 12px 14px;
    }
    .social-trending-head {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .social-trending-title {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .social-trending-title .social-chevron { font-size: 0.6rem; transition: transform .2s; display: inline-block; }
    .social-trending-strip.hidden .social-chevron { transform: rotate(-90deg); }
    .social-trending-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .social-trending-strip.hidden .social-trending-list { display: none; }
    .social-trending-strip.hidden .social-trending-head { margin-bottom: 0; }
    .social-trending-strip.hidden { padding-bottom: 8px; }
    .social-chip {
      border: 1px solid #22435f;
      background: rgba(10, 18, 32, 0.75);
      color: #dbeafe;
      border-radius: 999px;
      padding: 7px 10px;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: transform .15s, border-color .2s, box-shadow .2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .social-chip:hover {
      transform: translateY(-1px);
      border-color: #38bdf8;
      box-shadow: 0 8px 20px rgba(56, 189, 248, 0.2);
    }
    .social-chip-rank {
      color: #93c5fd;
      margin-right: 6px;
      font-size: 0.72rem;
      font-weight: 800;
    }

    /* Trend Direction Indicators */
    .social-chip.bullish {
      border-color: #34d399;
      color: #34d399;
      background: rgba(52, 211, 153, 0.08);
    }
    .social-chip.bullish:hover {
      border-color: #34d399;
      box-shadow: 0 8px 20px rgba(52, 211, 153, 0.25);
    }
    .social-chip.bearish {
      border-color: #f87171;
      color: #f87171;
      background: rgba(248, 113, 113, 0.08);
    }
    .social-chip.bearish:hover {
      border-color: #f87171;
      box-shadow: 0 8px 20px rgba(248, 113, 113, 0.25);
    }
    .chip-direction {
      font-size: 0.9rem;
      font-weight: 900;
      margin-right: 4px;
    }
    .chip-price {
      font-size: 0.72rem;
      color: #cbd5e1;
      font-weight: 700;
      margin-left: 4px;
    }
    .chip-session {
      font-size: 0.64rem;
      color: #94a3b8;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-left: 3px;
    }

    /* ── Earnings Panel ── */
    .earnings-panel { width: 100%; }
    .earnings-day-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .earnings-day-tab {
      background: rgba(255,255,255,0.04);
      border: 1px solid #1e3250;
      color: #94a3b8;
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .earnings-day-tab:hover { border-color: #38bdf8; color: #e0f2fe; }
    .earnings-day-tab.active {
      background: rgba(56,189,248,0.15);
      border-color: #38bdf8;
      color: #e0f2fe;
    }
    .earnings-day-tab.today-tab {
      border-color: #6366f1;
      color: #a5b4fc;
    }
    .earnings-day-tab.today-tab.active {
      background: rgba(99,102,241,0.18);
      border-color: #6366f1;
      color: #c7d2fe;
    }
    .earnings-grid {
      width: 100%;
      overflow-x: auto;
    }
    .earnings-grid-header,
    .earnings-grid-row {
      display: grid;
      grid-template-columns: 80px 80px 80px 80px 80px;
      gap: 0;
      align-items: center;
      padding: 4px 6px;
      border-radius: 6px;
      font-size: 0.78rem;
    }
    .earnings-grid-header {
      color: #64748b;
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 5px;
    }
    .earnings-grid-row {
      cursor: pointer;
      border: 1px solid transparent;
      transition: background .12s, border-color .12s;
      margin-bottom: 1px;
    }
    .earnings-grid-row:hover {
      background: rgba(56,189,248,0.07);
      border-color: #22435f;
    }
    .earnings-grid-row.sp500-row .eg-symbol { color: #93c5fd; font-weight: 800; }
    .eg-symbol { font-weight: 800; font-size: 0.82rem; color: #dbeafe; }
    .eg-time { display: flex; align-items: center; gap: 4px; font-size: 0.73rem; font-weight: 700; }
    .eg-time.bmo { color: #fbbf24; }
    .eg-time.amc { color: #818cf8; }
    .eg-implied { font-size: 0.75rem; font-weight: 700; color: #94a3b8; }
    .eg-avg { font-size: 0.75rem; font-weight: 700; }
    .eg-last { font-size: 0.75rem; font-weight: 700; }
    .eg-pos { color: #34d399; }
    .eg-neg { color: #f87171; }
    .eg-na  { color: #475569; }
    .earnings-empty { color: #475569; font-size: 0.82rem; padding: 8px 0; }

    @keyframes headline-scroll {
      from { transform: translateX(0); }
      to { transform: translateX(-100%); }
    }

    .news-skeleton { display: grid; gap: 10px; }
    .news-skeleton-row {
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 12px 14px;
      background: #0b1018;
    }
    .skeleton-bar {
      height: 11px;
      border-radius: 8px;
      background: linear-gradient(90deg, #111827 25%, #1f2937 50%, #111827 75%);
      background-size: 200% 100%;
      animation: shimmer 1.1s linear infinite;
    }
    .skeleton-title { width: 92%; margin-bottom: 8px; }
    .skeleton-title.short { width: 66%; }
    .skeleton-meta { width: 42%; height: 9px; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .dimtext { color: #475569; font-size: 0.84rem; }
    .loading-msg { color: #475569; padding: 48px 0; text-align: center; font-size: 0.95rem; letter-spacing: 0.02em; }

    /* Responsive adjustments */
    @media (max-width: 900px) {
      body { padding: 14px 10px 50px; }
      .market-ticker-bar { padding: 8px 12px; }
      .market-group { padding: 6px 8px; }
      .mkt-item { font-size: 0.78rem; gap:6px }
      .headline-track { gap: 18px; }
      .price-big { font-size: 44px; }
    }

    @media (max-width: 520px) {
      .search-wrap input { flex-basis: 100%; }
      .market-groups { gap:8px; }
      .group-label { display:none; }
      .market-ticker-bar { padding: 6px 8px; }
      .mkt-item { font-size: 0.72rem; }
      .headline-track { gap: 12px; }
      .price-big { font-size: 36px; }
      .page { padding-left: 8px; padding-right: 8px; }
    }
  </style>
</head>
<body>
<div class="page">

  <div id="marketTickerBar" class="market-ticker-bar"></div>

  <div class="headline-bar"><div id="overallHeadlines"></div></div>

  <div class="social-trending-strip" id="insightsStrip">
    <div class="social-trending-head">
      <button class="social-trending-title market-group-btn active" id="socialToggleTitle" type="button">Trending in Social <span class="social-chevron">&#x25BE;</span></button>
      <button class="social-trending-title market-group-btn" id="earningsToggleTitle" type="button">Earnings This Week <span class="social-chevron">&#x25BE;</span></button>
      <button class="social-trending-title market-group-btn" id="activeOptionsToggleTitle" type="button">Today's Most Active Options <span class="social-chevron">&#x25BE;</span></button>
    </div>
    <div id="insightsStripContent" class="social-trending-list">
      <span class="dimtext">Loading trending symbols...</span>
    </div>
  </div>

  <div class="search-wrap">
    <input id="ticker" placeholder="Search with ticker or name eg: NVDA, Nvidia" autocomplete="off" spellcheck="false" />
    <button id="fetchBtn">Search</button>
  </div>

  <div id="result"></div>

</div>
<script>
  const tickerInput = document.getElementById('ticker');
  const fetchBtn    = document.getElementById('fetchBtn');
  const resultEl    = document.getElementById('result');

  let inFlight = false, _poll = null, _prevClose = null, _cur = '';
  let _currentTicker = '', _currentCompanyName = '', _newsLoadedFor = '', _newsLoading = false;
  let _currentEarningsDate = null;
  let _initialTrendingConsumed = false;
  let _tickerOptionsLoadedFor = '';
  let _insightsStripMode = 'trending';
  let _trendingStripSymbols = [];
  let _trendingStripUnavailable = false;
  let _earningsStripSections = [];
  let _earningsStripUnavailable = false;
  let _earningsSelectedDate = null;
  let _activeOptionsItems = [];
  let _activeOptionsUnavailable = false;

  function setLoading(s) {
    inFlight = s;
    fetchBtn.disabled = s;
    fetchBtn.textContent = s ? 'Loading\u2026' : 'Search';
  }

  /* ── formatters ── */
  const fv  = v => (v == null || !Number.isFinite(+v)) ? 'N/A' : (+v).toFixed(2);
  const frt = v => v == null ? 'N/A' : ((+v)*100).toFixed(2)+'%';
  const fB  = v => { if(v==null) return 'N/A'; const n=+v; return Number.isFinite(n)?(n/1e9).toFixed(2)+'B':'N/A'; };
  const fM  = v => {
    if(v==null) return 'N/A'; const n=+v; if(!Number.isFinite(n)) return 'N/A';
    if(Math.abs(n)>=1e12) return (n/1e12).toFixed(2)+'T';
    if(Math.abs(n)>=1e9)  return (n/1e9).toFixed(2)+'B';
    if(Math.abs(n)>=1e6)  return (n/1e6).toFixed(2)+'M';
    return n.toLocaleString();
  };
  const clean = v => !v ? '' : String(v).replace(/\s*[-\u2014]?\s*Yahoo Finance\b/ig,'').replace(/\s+/g,' ').trim();
  const stripCompanySuffixes = v => clean(v)
    .replace(/\b(inc\.?|corp\.?|corporation|company|co\.?|limited|ltd\.?|plc|holdings?)\b/ig, '')
    .replace(/\s+/g, ' ')
    .trim();
  const fR    = (l,s) => !l ? 'N/A' : (s!=null ? l+' ('+s.toFixed(1)+')' : l);
  const fDate = ts => {
    if (ts == null || ts === '' || ts === false) return '\u2014';
    // Handle ISO strings (e.g. "2026-04-30T20:00:00.000Z") directly
    if (typeof ts === 'string') {
      const d = new Date(ts);
      return isNaN(d.getTime()) ? '\u2014' : d.toLocaleDateString(undefined, {year:'numeric',month:'short',day:'numeric'});
    }
    // Handle numeric unix timestamps (seconds < 1e11, or ms >= 1e11)
    const n = +ts;
    if (!Number.isFinite(n) || n <= 0) return '\u2014';
    const ms = n >= 1e11 ? n : n * 1000;
    const d  = new Date(ms);
    return isNaN(d.getTime()) ? '\u2014' : d.toLocaleDateString(undefined, {year:'numeric',month:'short',day:'numeric'});
  };
  const m     = (lbl, val) => '<div class="metric"><div class="m-label">'+lbl+'</div><div class="m-value">'+val+'</div></div>';
  const newsHtml = (news) => {
    if (!Array.isArray(news) || news.length === 0) {
      return '<p class="dimtext">No recent news found.</p>';
    }
    return '<div class="news-list">' + news.map(item => {
      const title = item.title || 'Untitled';
      const source = item.source || 'Unknown source';
      const time = item.relativeTime || 'Unknown time';
      const url = item.url || '#';
      return '<a class="news-item" href="'+url+'" target="_blank" rel="noopener noreferrer">'
        + '<div class="news-title">'+title+'</div>'
        + '<div class="news-meta">'+source+' · '+time+'</div>'
        + '</a>';
    }).join('') + '</div>';
  };

  const newsSkeletonHtml = () => {
    return '<div class="news-skeleton">'
      + '<div class="news-skeleton-row"><div class="skeleton-bar skeleton-title"></div><div class="skeleton-bar skeleton-title short"></div><div class="skeleton-bar skeleton-meta"></div></div>'
      + '<div class="news-skeleton-row"><div class="skeleton-bar skeleton-title"></div><div class="skeleton-bar skeleton-meta"></div></div>'
      + '<div class="news-skeleton-row"><div class="skeleton-bar skeleton-title"></div><div class="skeleton-bar skeleton-title short"></div><div class="skeleton-bar skeleton-meta"></div></div>'
      + '</div>';
  };

  const overallTickerHtml = (news) => {
    if (!Array.isArray(news) || news.length === 0) {
      return '<p class="dimtext" style="padding:0 12px">No latest market headlines right now.</p>';
    }
    const itemHtml = news.slice(0, 10).map(item => {
      const title = item.title || 'Untitled';
      const source = item.source || 'Unknown';
      const time = item.relativeTime || '';
      const url = item.url || '#';
      return '<a class="headline-item" href="'+url+'" target="_blank" rel="noopener noreferrer">'
        + '<span class="headline-source">'+source+'</span>'
        + '<span>'+title+'</span>'
        + (time ? '<span class="headline-time">('+time+')</span>' : '')
        + '</a>';
    }).join('');

    // Duplicate content once for smooth looping.
    return '<div class="headline-track">'+itemHtml+itemHtml+'</div>';
  };

  const trendingStocktwitsHtml = (symbols) => {
    if (!Array.isArray(symbols) || symbols.length === 0) {
      return '<span class="dimtext">No trending symbols right now.</span>';
    }
    return symbols.slice(0, 10).map((s, i) => {
      const sym = s.symbol || 'N/A';
      const title = s.title || '';
      const direction = s.direction || 'neutral'; // bullish, bearish, or neutral
      const arrow = s.arrow || '●';
      const price = Number.isFinite(+s.displayPrice) ? (+s.displayPrice).toLocaleString('en-US', { maximumFractionDigits: 2, minimumFractionDigits: 2 }) : null;
      const session = s.displaySession || '';
      const activePct = Number.isFinite(+s.displayChangePct)
        ? +s.displayChangePct
        : (session === 'After Hours' && Number.isFinite(+s.extendedChangePct)
            ? +s.extendedChangePct
            : (Number.isFinite(+s.regularChangePct) ? +s.regularChangePct : null));
      const pct = activePct != null ? ((activePct > 0 ? '+' : '') + activePct.toFixed(2) + '%') : '';
      const priceAndPct = [price ? ('$'+price) : '', pct ? (price ? (' ('+pct+')') : pct) : ''].join('');
      return '<button class="social-chip '+direction+'" data-st-symbol="'+escapeHtml(sym)+'" title="'+escapeHtml(title)+'">'
        + '<span class="social-chip-rank">#'+(i + 1)+'</span>'
        + '<span class="chip-direction">'+arrow+'</span>'
        + '<span>'+escapeHtml(sym)+'</span>'
        + (priceAndPct ? ('<span class="chip-price">'+priceAndPct+'</span>') : '')

    }).join('');
  };

  function consumeInitialTrendingSymbols() {

    const symbols = Array.isArray(initial)
      ? initial
      : (Array.isArray(initial?.symbols) ? initial.symbols : null);

  function formatEarningsDateLabel(dateIso) {
    const d = new Date(dateIso + 'T00:00:00');
    if (Number.isNaN(d.getTime())) return dateIso;
    return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
  }

  function earningsHourLabel(hour) {
    const v = String(hour || '').toLowerCase();
    if (v === 'bmo') return 'BMO';
    if (v === 'amc') return 'AMC';
    return 'TBD';
  }

  function normalizeEarningsSections(payload) {
    try {
      const days = payload && typeof payload.days === 'object' && payload.days ? payload.days : {};
      const allDates = Object.keys(days).sort();
      if (allDates.length === 0) return [];

      return allDates.map((dateIso) => {
        const rows = Array.isArray(days[dateIso]) ? days[dateIso] : [];
        const sortedRows = rows.slice().sort((a, b) => {
          const aSp = a && a.isSp500 ? 1 : 0;
          const bSp = b && b.isSp500 ? 1 : 0;
          if (aSp !== bSp) return bSp - aSp;
          return String(a?.symbol || '').localeCompare(String(b?.symbol || ''));
        });
        return { dateIso, dateLabel: formatEarningsDateLabel(dateIso), rows: sortedRows };
      }).filter((x) => x.rows.length > 0);
    } catch (e) {
      console.error('[earnings] normalizeEarningsSections error:', e);
      return [];
    }
  }

  function earningsStripHtml(sections, selectedDate) {
    if (!Array.isArray(sections) || sections.length === 0) {
      return '<span class="dimtext">No earnings schedule available right now.</span>';
    }

    const today = new Date().toISOString().slice(0, 10);
    // Default to today if in sections, else nearest future date, else first date
    if (!selectedDate || !sections.find(s => s.dateIso === selectedDate)) {
      const todaySection = sections.find(s => s.dateIso === today);
      const futureSection = sections.find(s => s.dateIso >= today);
      selectedDate = (todaySection || futureSection || sections[0]).dateIso;
    }
    _earningsSelectedDate = selectedDate;

    // Day tabs
    const tabs = sections.map(s => {
      const isToday = s.dateIso === today;
      const isActive = s.dateIso === selectedDate;
      const cls = ['earnings-day-tab', isToday ? 'today-tab' : '', isActive ? 'active' : ''].filter(Boolean).join(' ');
      const label = isToday ? s.dateLabel + ' ✦' : s.dateLabel;
      return `<button class="${cls}" data-edate="${escapeHtml(s.dateIso)}" type="button">${escapeHtml(label)}</button>`;
    }).join('');

    // Grid for selected section
    const section = sections.find(s => s.dateIso === selectedDate);
    let grid = '';
    if (!section || section.rows.length === 0) {
      grid = '<div class="earnings-empty">No earnings on this date.</div>';
    } else {
      const header = '<div class="earnings-grid-header">'
        + '<span>Symbol</span><span>Time</span><span>Implied</span><span>Avg 4Q</span><span>Last</span>'
        + '</div>';

      const rows = section.rows.map(row => {
        const sym = row?.symbol || 'N/A';
        const isSp = row?.isSp500 ? ' sp500-row' : '';
        const hour = String(row?.hour || '').toLowerCase();
        const timeLabel = hour === 'bmo' ? '🌅 BMO' : hour === 'amc' ? '🌙 AMC' : '— TBD';
        const timeCls = 'eg-time ' + (hour === 'bmo' ? 'bmo' : hour === 'amc' ? 'amc' : '');

        const impliedRaw = row?.impliedMove;
        const impliedStr = impliedRaw ? escapeHtml(String(impliedRaw)) : '<span class="eg-na">—</span>';

        const avgRaw = Number(row?.avgLast4EarningsMove);
        const avgStr = Number.isFinite(avgRaw)
          ? `<span class="${avgRaw >= 0 ? 'eg-pos' : 'eg-neg'}">${avgRaw >= 0 ? '+' : ''}${Math.abs(avgRaw).toFixed(1)}%</span>`
          : '<span class="eg-na">—</span>';

        const lastRaw = Number(row?.lastEarningsMove);
        const lastStr = Number.isFinite(lastRaw)
          ? `<span class="${lastRaw >= 0 ? 'eg-pos' : 'eg-neg'}">${lastRaw >= 0 ? '+' : ''}${lastRaw.toFixed(1)}%</span>`
          : '<span class="eg-na">—</span>';

        return `<div class="earnings-grid-row${isSp}" data-earnings-symbol="${escapeHtml(sym)}" role="button" tabindex="0">`
          + `<span class="eg-symbol">${escapeHtml(sym)}</span>`
          + `<span class="${timeCls}">${timeLabel}</span>`
          + `<span class="eg-implied">${impliedStr}</span>`
          + `<span class="eg-avg">${avgStr}</span>`
          + `<span class="eg-last">${lastStr}</span>`
          + `</div>`;
      }).join('');

      grid = `<div class="earnings-grid">${header}${rows}</div>`;
    }

    return `<div class="earnings-panel"><div class="earnings-day-tabs">${tabs}</div>${grid}</div>`;
  }

  function wireEarningsSymbolsButtons() {
    // Wire symbol row clicks → search
    document.querySelectorAll('[data-earnings-symbol]').forEach((btn) => {
      btn.onclick = () => {
        const sym = btn.getAttribute('data-earnings-symbol');

        tickerInput.value = sym;
        doSearch();

    });
    // Wire day tab clicks → re-render for selected date
    document.querySelectorAll('.earnings-day-tab[data-edate]').forEach((tab) => {

  function renderInsightsStripContent() {
    const container = document.getElementById('insightsStripContent');
    if (!container) return;

    if (_insightsStripMode === 'earnings') {
      container.innerHTML = earningsStripHtml(_earningsStripSections, _earningsSelectedDate);
      wireEarningsSymbolsButtons();
      return;
    }

    if (_insightsStripMode === 'activeOptions') {
      container.innerHTML = activeOptionsStripHtml(_activeOptionsItems);
      wireActiveOptionsButtons();
      return;
    }

    if (_trendingStripUnavailable && _trendingStripSymbols.length === 0) {
      container.innerHTML = '<span class="dimtext">Unavailable</span>';
      return;
    }

    container.innerHTML = trendingStocktwitsHtml(_trendingStripSymbols);
    wireTrendingSymbolsButtons();
  }

  function setInsightsStripMode(nextMode) {
    const strip = document.getElementById('insightsStrip');
    const socialBtn = document.getElementById('socialToggleTitle');
    const earningsBtn = document.getElementById('earningsToggleTitle');
    const activeOptionsBtn = document.getElementById('activeOptionsToggleTitle');
    if (!strip || !socialBtn || !earningsBtn || !activeOptionsBtn) return;

    if (_insightsStripMode === nextMode) {
      _insightsStripMode = null;
      strip.classList.add('hidden');
      socialBtn.classList.remove('active');
      earningsBtn.classList.remove('active');
      activeOptionsBtn.classList.remove('active');
      return;
    }

    _insightsStripMode = nextMode;
    strip.classList.remove('hidden');
    socialBtn.classList.toggle('active', nextMode === 'trending');
    earningsBtn.classList.toggle('active', nextMode === 'earnings');
    activeOptionsBtn.classList.toggle('active', nextMode === 'activeOptions');
    renderInsightsStripContent();
  }

  function wireInsightsStripButtons() {
    const socialBtn = document.getElementById('socialToggleTitle');
    const earningsBtn = document.getElementById('earningsToggleTitle');
    const activeOptionsBtn = document.getElementById('activeOptionsToggleTitle');
    if (socialBtn) {
      socialBtn.onclick = () => setInsightsStripMode('trending');
    }
    if (earningsBtn) {
      earningsBtn.onclick = async () => {
        if (_earningsStripSections.length === 0) {
          await loadEarningsWeek();
        }
        setInsightsStripMode('earnings');
      };
    }
    if (activeOptionsBtn) {
      activeOptionsBtn.onclick = async () => {
        if (_activeOptionsItems.length === 0) {
          await loadActiveOptions();
        }
        setInsightsStripMode('activeOptions');
      };
    }
  }

  async function loadStocktwitsTrending() {
    const initialSymbols = consumeInitialTrendingSymbols();
    if (initialSymbols) {
      _trendingStripSymbols = initialSymbols;
      if (_insightsStripMode === 'trending') renderInsightsStripContent();
    }

    try {
      let res = await fetch('/api/trending', getStocktwitsFetchOptions());
      if (!res.ok) {
        res = await fetch('/api/social/trending' + getStocktwitsQueryString(), getStocktwitsFetchOptions());
      }
      const data = await res.json();
      if (data && !data.error && Array.isArray(data.symbols)) {
        _trendingStripSymbols = data.symbols;
        if (_insightsStripMode === 'trending') renderInsightsStripContent();
      }
    } catch (_) {
      // silently fail - let the UI show "unavailable" message
    }
  }

  async function loadEarningsWeek() {
    try {
      const res = await fetch('/api/earnings/week');
      if (!res.ok) throw new Error('earnings_week_http_' + res.status);
      const payload = await res.json();
      _earningsStripSections = normalizeEarningsSections(payload);
      if (_insightsStripMode === 'earnings') renderInsightsStripContent();
    } catch (err) {
      console.error('[earnings] loadEarningsWeek error:', err);
      _earningsStripSections = [];
    }
  }

  function activeOptionsStripHtml(items) {
    if (!Array.isArray(items) || items.length === 0) {
      return '<span class="dimtext">No active options available right now.</span>';

    return items.slice(0, 15).map((it, i) => {
      const symbol = it.symbol || 'N/A';
      const type = it.type || '';
      const strike = Number.isFinite(+it.strike) ? (+it.strike).toFixed(2) : '\u2014';

    document.querySelectorAll('[data-active-symbol]').forEach((btn) => {
      btn.onclick = () => {
        const sym = btn.getAttribute('data-active-symbol');

  async function loadActiveOptions() {
    const initial = window.INITIAL_ACTIVE_OPTIONS_DATA;
    if (initial && Array.isArray(initial.items) && initial.items.length > 0) {
      _activeOptionsItems = initial.items;
      if (_insightsStripMode === 'activeOptions') renderInsightsStripContent();
    }
    try {
      const res = await fetch('/api/options/active');
      const data = await res.json();
      if (data && !data.error && Array.isArray(data.items)) {
        _activeOptionsItems = data.items;
        if (_insightsStripMode === 'activeOptions') renderInsightsStripContent();
      }
    } catch (_) {
      // silently fail - let the UI show "no options available" message
    }

  function tickerOptionsHtml(payload) {
    const calls = Array.isArray(payload?.calls) ? payload.calls : [];
    const puts = Array.isArray(payload?.puts) ? payload.puts : [];
    function rowHtml(r) {
      const strike = Number.isFinite(+r.strike) ? (+r.strike).toFixed(2) : '\u2014';
      const last = Number.isFinite(+r.lastPrice) ? (+r.lastPrice).toFixed(2) : '\u2014';
      const vol = Number.isFinite(+r.volume) ? Math.round(+r.volume).toLocaleString() : '\u2014';
      const oi = Number.isFinite(+r.openInterest) ? Math.round(+r.openInterest).toLocaleString() : '\u2014';
      return '<tr><td>'+escapeHtml(r.type || '')+'</td><td>'+strike+'</td><td>'+last+'</td><td>'+vol+'</td><td>'+oi+'</td></tr>';
    }
    const rows = [...calls, ...puts].slice(0, 30).map(rowHtml).join('');
    if (!rows) return '<p class="dimtext">No options contracts available.</p>';
    return '<div class="dimtext" style="margin-bottom:8px">Nearest expiry: '+escapeHtml(payload.expirationDate || '\u2014')+'</div>'
      + '<table style="width:100%;border-collapse:collapse">'
      + '<thead><tr><th style="text-align:left">Type</th><th style="text-align:left">Strike</th><th style="text-align:left">Last</th><th style="text-align:left">Volume</th><th style="text-align:left">OI</th></tr></thead>'
      + '<tbody>'+rows+'</tbody></table>';
  }

  async function loadTickerOptionsForCurrentTicker() {
    const container = document.getElementById('tickerOptionsContainer');
    if (!container || !_currentTicker) return;
    if (_tickerOptionsLoadedFor === _currentTicker) return;
    container.innerHTML = '<p class="dimtext">Loading options chain...</p>';
    try {
      const res = await fetch('/api/options/' + encodeURIComponent(_currentTicker));
      const data = await res.json();
      if (data.error) {
        container.innerHTML = '<p class="dimtext">'+escapeHtml(data.error)+'</p>';
        return;
      }
      container.innerHTML = tickerOptionsHtml(data);
      _tickerOptionsLoadedFor = _currentTicker;
    } catch (_) {
      container.innerHTML = '<p class="dimtext">Unable to load options chain.</p>';
    }
  }

  const MARKET_GROUPS = {
    US:       ['S&P 500','Nasdaq'],
    Metals:   ['Gold','Silver'],
    Bonds:    ['2Y','10Y'],
    Energy:   ['WTI','Brent'],
    Crypto:   ['BTC','ETH'],
    Currency: ['USD/INR','Dollar Index'],
    Asia:     ['Nikkei','KOSPI','Sensex']
  };

  // ── Persistent module-level market state ──
  // Survives across loadMarketIndices calls so pills are never torn down mid-update.
  let _mktContentMap  = {};   // group -> inner HTML (rows)
  let _activeGroup    = 'US'; // currently open tab
  let _mktPillsWired  = false;

  /** Loading-skeleton rows for a group (shown before data arrives). */
  function _mktSkeletonRows(g) {
    return MARKET_GROUPS[g].map(l =>
      '<div class="market-row">' +
        '<div class="market-cell-label">' + l + '</div>' +
        '<div class="market-cell-price" style="color:#334155">—</div>' +
        '<div class="market-cell-chg mkt-chg flat"></div>' +
      '</div>'
    ).join('');
  }

  /** Build the bar shell (pills + content area) exactly once. */
  function _buildMarketShell() {
    const bar = document.getElementById('marketTickerBar');
    if (!bar) return;
    // Pre-fill content map with loading skeletons for every group
    Object.keys(MARKET_GROUPS).forEach(g => {
      if (!_mktContentMap[g]) _mktContentMap[g] = _mktSkeletonRows(g);
    });
    const pillsHtml = Object.keys(MARKET_GROUPS).map(g =>
      '<button class="market-group-btn' + (g === _activeGroup ? ' active' : '') + '" data-group="' + g + '">' + g + '</button>'
    ).join('');
    bar.innerHTML =
      '<div class="market-groups">' + pillsHtml + '</div>' +
      '<div id="marketContentArea" class="market-content-area visible">' + (_mktContentMap[_activeGroup] || '') + '</div>';
    _wireMarketPills();
  }

  /** Wire pill click handlers (called once after shell is built). */
  function _wireMarketPills() {
    if (_mktPillsWired) return;
    _mktPillsWired = true;
    const bar = document.getElementById('marketTickerBar');
    if (!bar) return;
    bar.addEventListener('click', e => {
      const btn = e.target.closest('.market-group-btn[data-group]');
      if (!btn) return;
      const g = btn.dataset.group;
      const contentArea = document.getElementById('marketContentArea');
      if (!contentArea) return;
      if (btn.classList.contains('active')) {
        // toggle off
        btn.classList.remove('active');
        contentArea.classList.remove('visible');
        _activeGroup = null;
      } else {
        document.querySelectorAll('.market-group-btn[data-group]').forEach(p =>
          p.classList.toggle('active', p.dataset.group === g)
        );
        contentArea.innerHTML = _mktContentMap[g] || _mktSkeletonRows(g);
        contentArea.classList.add('visible');
        _activeGroup = g;
      }
    });
  }

  /** Build one market-row HTML string from an index item object. */
  function _mktItemHtml(idx) {
    const price  = idx.price != null ? idx.price.toLocaleString('en-US', { maximumFractionDigits: 2, minimumFractionDigits: 2 }) : '—';
    const dayPct = idx.regularChangePct != null ? idx.regularChangePct : (idx.changePct != null ? idx.changePct : null);
    const dir    = dayPct == null ? 'flat' : dayPct > 0 ? 'up' : dayPct < 0 ? 'down' : 'flat';
    const arrow  = dir === 'up' ? '▲' : dir === 'down' ? '▼' : '●';
    const pctStr = dayPct != null ? (dayPct > 0 ? '+' : '') + dayPct.toFixed(2) + '%' : '';
    const tooltip = idx.label + (pctStr ? ' — ' + pctStr : '') + ' — ' + price;
    let afterHtml = '';
    try {
      const isAfter = idx.marketSession === 'extended' || (idx.extendedPrice != null && idx.regularPrice != null && idx.extendedPrice !== idx.regularPrice);
      if (isAfter) {
        const regular = Number.isFinite(+idx.regularPrice) ? +idx.regularPrice : null;
        const ext     = Number.isFinite(+idx.extendedPrice) ? +idx.extendedPrice : null;
        let extPct = null;
        if (ext != null && regular != null && regular !== 0) extPct = ((ext - regular) / regular) * 100;
        else if (idx.extendedChangePct != null)              extPct = +idx.extendedChangePct;
        if (extPct != null) {
          const extDir = extPct > 0 ? 'up' : extPct < 0 ? 'down' : 'flat';
          const extStr = (extPct > 0 ? '+' : '') + extPct.toFixed(2) + '%';
          afterHtml = '<div class="market-cell-after"><span class="after-hours-badge">AH <span class="after-hours-value ' + extDir + '">' + extStr + '</span></span></div>';
        } else {
          afterHtml = '<div class="market-cell-after"><span class="after-hours-badge">After Hours</span></div>';
        }
      }
    } catch (e) {}
    return '<div class="market-row" title="' + tooltip + '">'
      + '<div class="market-cell-label">'  + idx.label + '</div>'
      + '<div class="market-cell-price">'  + price     + '</div>'
      + '<div class="market-cell-chg mkt-chg ' + dir + '">' + (pctStr ? arrow + ' ' + pctStr : '') + '</div>'
      + afterHtml
      + '</div>';
  }

  /**
   * Update _mktContentMap for whichever groups have data in `indices`,
   * then refresh the content area if the active group changed.
   * Pills are NEVER rebuilt — only content is updated in-place.
   */
  function renderMarketTicker(indices) {
    if (!Array.isArray(indices) || indices.length === 0) return;
    const labelList = indices.filter(i => i && i.label != null).map(i => ({ label: String(i.label), item: i }));
    function findByLabel(lbl) {
      const exact = labelList.find(x => x.label === lbl);
      if (exact) return exact.item;
      const low = String(lbl).toLowerCase();
      const fuzzy = labelList.find(x => x.label.toLowerCase().includes(low) || low.includes(x.label.toLowerCase()));
      return fuzzy ? fuzzy.item : null;
    }
    let activeGroupUpdated = false;
    Object.keys(MARKET_GROUPS).forEach(g => {
      const items = MARKET_GROUPS[g].map(l => findByLabel(l)).filter(Boolean);
      if (items.length > 0) {
        _mktContentMap[g] = items.map(_mktItemHtml).join('');
        if (g === _activeGroup) activeGroupUpdated = true;
      }
    });
    // Refresh visible content area if the currently open tab just got real data
    if (activeGroupUpdated && _activeGroup) {
      const contentArea = document.getElementById('marketContentArea');
      if (contentArea) {
        contentArea.innerHTML = _mktContentMap[_activeGroup];
        contentArea.classList.add('visible');
      }
    }
  }

  async function loadMarketIndices() {
    // Build the tab shell once (all tabs visible immediately with loading rows).
    // On subsequent poll cycles the shell already exists; _buildMarketShell is cheap.
    _mktPillsWired = false; // re-wire after potential DOM re-render on refresh
    _buildMarketShell();
    try {
      const fetchOptions = getStocktwitsFetchOptions();
      // Stage 1 — US only: fast, fills the default active tab
      const usRes  = await fetch('/api/market-indices?group=US', fetchOptions);
      const usData = await usRes.json();
      if (usData.indices) renderMarketTicker(usData.indices);

      // Stage 2 — all groups: runs in background, updates each tab as data arrives
      fetch('/api/market-indices', fetchOptions)
        .then(r => r.json())
        .then(allData => { if (allData && allData.indices) renderMarketTicker(allData.indices); })
        .catch(() => {});
    } catch (e) {
      // keep skeleton on network failure
    }
  }

  async function loadNewsForCurrentTicker() {
    const container = document.getElementById('newsContainer');
    if (!container || !_currentTicker || _newsLoading || _newsLoadedFor === _currentTicker) return;

    _newsLoading = true;
    container.innerHTML = newsSkeletonHtml();

    try {
      const params = new URLSearchParams();
      if (_currentCompanyName) params.set('companyName', _currentCompanyName);
      if (Number.isFinite(+_currentEarningsDate)) params.set('earningsDate', String(_currentEarningsDate));
      const query = params.toString() ? ('?' + params.toString()) : '';
      const res = await fetch('/api/news/' + encodeURIComponent(_currentTicker) + query);

      if (data.error) {
        container.innerHTML = '<p class="dimtext">Unable to fetch news.</p>';

      }
      container.innerHTML = newsHtml(data.news);
      _newsLoadedFor = _currentTicker;
    } catch (_) {
      container.innerHTML = '<p class="dimtext">Unable to fetch news.</p>';
    } finally {
      _newsLoading = false;
    }

  async function loadSocialForCurrentTicker() {
    const container = document.getElementById('socialContainer');
    if (!container || !_currentTicker) return;
    container.innerHTML = '<p class="dimtext">Loading social sentiment...</p>';
    try {
      const res = await fetch(
        '/api/social/sentiment/' + encodeURIComponent(_currentTicker) + getStocktwitsQueryString(),
        getStocktwitsFetchOptions()
      );
      const data = await res.json();
      if (data.authRequired) {
        const trending = Array.isArray(data.trending) && data.trending.length
          ? ('<div style="margin-top:12px"><div class="dimtext" style="margin-bottom:6px">Trending now:</div><div style="display:flex;gap:6px;flex-wrap:wrap">' + data.trending.map(t => ('<button class="tab-btn" style="padding:4px 8px" data-social-symbol="'+escapeHtml(t.symbol)+'">'+escapeHtml(t.symbol)+'</button>')).join('') + '</div></div>')
          : '';
        container.innerHTML = socialAuthPromptHtml(data.error) + trending;
        wireSocialAuthPrompt();
        wireTrendingSocialSymbols();
        return;
      }
      if (data.error) {
        if (String(data.error).toLowerCase().includes('auth missing')) {
          container.innerHTML = socialAuthPromptHtml(data.error);

        container.innerHTML = '<p class="dimtext">' + msg + '</p>' + det;

        : '<p class="dimtext">No recent messages available.</p>';

      if (username) localStorage.setItem('stocktwitsUsername', username);

  function getStocktwitsPassword() {
    try { return localStorage.getItem('stocktwitsPassword') || ''; } catch (_) { return ''; }

  }

  function getStocktwitsToken() {
    try { return localStorage.getItem('stocktwitsToken') || ''; } catch (_) { return ''; }

  function getStocktwitsAuthorizationHeader() {
    const username = getStocktwitsUsername();
    const password = getStocktwitsPassword();
    if (!username || !password) return '';
    try {
      return 'Basic ' + btoa(username + ':' + password);
    } catch (_) {
      return '';
    }
  }

  function getStocktwitsFetchOptions() {
    const authorization = getStocktwitsAuthorizationHeader();
    return authorization ? { headers: { Authorization: authorization } } : {};
  }

  function getStocktwitsQueryString() {
    const token = getStocktwitsToken();
    return token ? ('?token=' + encodeURIComponent(token)) : '';
  }

  async function registerStocktwitsDefaultAuth() {
    const payload = {
      username: getStocktwitsUsername(),
      password: getStocktwitsPassword(),
      token: getStocktwitsToken()
    };
    const hasAnyAuth = payload.token || (payload.username && payload.password);
    if (!hasAnyAuth) return { ok: true, skipped: true };
    const res = await fetch('/api/social/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    return res.json();
  }

  async function clearStocktwitsDefaultAuth() {
    try {
      await fetch('/api/social/auth', { method: 'DELETE' });
    } catch (_) {}
  }

  function wireSocialAuthPrompt() {
    const userInput = document.getElementById('stocktwitsUsernameInput');
    const passwordInput = document.getElementById('stocktwitsPasswordInput');
    const tokenInput = document.getElementById('stocktwitsTokenInput');
    const saveBtn = document.getElementById('saveStocktwitsAuthBtn');
    const clearBtn = document.getElementById('clearStocktwitsAuthBtn');
    if (userInput) userInput.value = getStocktwitsUsername();
    if (passwordInput) passwordInput.value = getStocktwitsPassword();
    if (tokenInput) tokenInput.value = getStocktwitsToken();
    if (saveBtn) {
      saveBtn.onclick = async () => {
        setStocktwitsUsername(String(userInput?.value || '').trim());
        setStocktwitsPassword(String(passwordInput?.value || '').trim());
        setStocktwitsToken(String(tokenInput?.value || '').trim());
        await registerStocktwitsDefaultAuth();
        await loadStocktwitsTrending();
        await loadMarketIndices();
        await loadSocialForCurrentTicker();
      };
    }
    if (clearBtn) {
      clearBtn.onclick = async () => {
        setStocktwitsUsername('');
        setStocktwitsPassword('');
        setStocktwitsToken('');
        await clearStocktwitsDefaultAuth();
        if (userInput) userInput.value = '';

  /* ── live price update ── */
  function updatePrice(price, currency, prevClose) {
    const pe = document.getElementById('priceValue');
    const be = document.getElementById('pctChange');
    if (!pe||!be) return;
    if (currency) _cur = currency;
    if (Number.isFinite(prevClose)) _prevClose = prevClose;
    pe.textContent = (_cur?_cur+' ':'')+fv(price);
    if (!_prevClose) { be.textContent='\u2014'; be.className='pct-badge pct-neutral'; return; }
    const pct = ((price-_prevClose)/_prevClose)*100;
    be.textContent = (pct>0?'\u25b2 ':pct<0?'\u25bc ':'')+Math.abs(pct).toFixed(2)+'%';
    be.className = 'pct-badge '+(pct>0?'pct-positive':pct<0?'pct-negative':'pct-neutral');
  }

        .then(r=>r.json()).then(d=>{

          if(Number.isFinite(p)) updatePrice(p,d.currency,+d.previousClose);
        }).catch(()=>{});
    }, 5000);

  /* ── tab wiring ── */
  function wireTabs() {
    const btns = document.querySelectorAll('.tab-btn');

    function getArea() {
      return document.getElementById('tab-content-area');
    }

    async function showTab(id, btn) {
      const area = getArea();
      if (!area) return;
      btns.forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      const tabMap = window._tabContentMap || {};
      area.innerHTML = tabMap[id] || '<p class="dimtext">No content for this tab.</p>';
      area.style.display = 'block';
      if (id === 'news') await loadNewsForCurrentTicker();
      if (id === 'social') await loadSocialForCurrentTicker();
      if (id === 'options') await loadTickerOptionsForCurrentTicker();
    }

    btns.forEach(btn => btn.addEventListener('click', async () => {
      const id       = btn.dataset.tab;
      const isActive = btn.classList.contains('active');
      if (isActive) {
        btn.classList.remove('active');
        const area = getArea();
        if (area) area.style.display = 'none';
        return;
      }
      await showTab(id, btn);
    }));

    // expose for auto-open
    wireTabs._show = showTab;
  }

      async function loadAndRenderSentiment(sym) {
        try {
          const res = await fetch('/api/compare/' + encodeURIComponent(sym));
          if (!res.ok) return;
          const j = await res.json();
          const comps = j.comparisons || {};
          const parts = [];
          const sentimentClass = (s) => s === 'UP' ? 'delta-up' : s === 'DOWN' ? 'delta-down' : 'delta-neutral';
          const fmtPct = (n) => {
            if (n == null || !Number.isFinite(n)) return '';
            const abs = Math.abs(n);
            if (abs > 999) return (n < 0 ? '-' : '') + '999%+';
            return (n > 0 ? '+' : '') + Number(n).toFixed(2) + '%';
          };
          function add(label, key, fmt) {
            const c = comps[key];
            if (!c) return;
            const isLowerBetter = key === 'forwardPE' || key === 'evEbitda';
            const val = (c.value == null) ? 'N/A' : (fmt ? fmt(c.value) : String(c.value));
            const dev = c.deviationPct != null ? Number(Number(c.deviationPct).toFixed(2)) : null;
            const rel = fmtPct(dev);
            const baseline = (c.histSectorAvg ?? c.sectorAvg ?? null);
            // Use the deviation sign for wording so percent and direction align (e.g., "93% below")
            const direction = (dev != null) ? (dev < 0 ? 'below' : dev > 0 ? 'above' : 'near') : '';
            const displaySentiment = (dev == null)
              ? 'AVERAGE'
              : (isLowerBetter
                ? (dev < 0 ? 'UP' : dev > 0 ? 'DOWN' : 'AVERAGE')
                : (dev > 0 ? 'UP' : dev < 0 ? 'DOWN' : 'AVERAGE'));
            const devClass = sentimentClass(displaySentiment);
            const note = rel ? ` — <span class="${devClass}" title="Thumb indicates sentiment; deviation shows percent difference vs baseline">` + rel + ' ' + direction + '</span>' : '';
            const emoji = displaySentiment === 'UP' ? '👍' : displaySentiment === 'DOWN' ? '👎' : '➡️';
            parts.push('<div class="sent-row"><strong>' + label + '</strong><div>' + emoji + '<span style="margin-left:8px">' + val + note + '</span></div></div>');
            // Always show sector avg and stock historical avg rows (use 'N/A' when missing)
            const sectorVal = c.sectorAvg != null ? (fmt ? fmt(c.sectorAvg) : String(c.sectorAvg)) : 'N/A';
            parts.push('<div class="sent-subrow">Sector avg: <strong>' + sectorVal + '</strong></div>');

            const histStockVal = c.stockHistAvg != null ? (fmt ? fmt(c.stockHistAvg) : String(c.stockHistAvg)) : 'N/A';
            const histWindow = c.stockHistWindow || '5yr';
            parts.push('<div class="sent-subrow">' + histWindow + ' historical avg: <strong>' + histStockVal + '</strong></div>');
          }
          add('Forward P/E', 'forwardPE', v => Number.isFinite(v) ? v.toFixed(2) + 'x' : String(v));
          add('EV/EBITDA', 'evEbitda', v => Number.isFinite(v) ? v.toFixed(2) + 'x' : String(v));
          add('FCF Margin', 'fcfMargin', v => Number.isFinite(v) ? (v * 100).toFixed(2) + '%' : String(v));

          if (parts.length > 0) {
            const sentimentHtml = '<div class="panel-label">Historical and Sector Comparison</div>' + parts.join('');
            // Prepend sentiment section to fundamentals content
            window._tabContentMap.fundamentals = sentimentHtml + window._tabContentMap.fundamentals;
            if (document.querySelector('.tab-btn.active')?.dataset?.tab === 'fundamentals') {
              const area = document.getElementById('tab-content-area');
              if (area) area.innerHTML = window._tabContentMap.fundamentals;
            }
          }
        } catch (e) {
          // silent
        }
      }

      const regularNow = Number.isFinite(+data.regularPrice) ? +data.regularPrice : +data.regularMarketPrice;
      if (Number.isFinite(regularNow)) updatePrice(regularNow, data.currency, +data.previousClose);

      // Populate after-hours badge and percent when extended price is present
      try {
        const afterEl = document.getElementById('afterHoursInfo');
        if (afterEl) {
          const isAfterHours = data.marketSession === 'extended';
          const regular = Number.isFinite(+data.regularMarketPrice) ? +data.regularMarketPrice : null;
          const ext = Number.isFinite(+data.extendedPrice) ? +data.extendedPrice : (Number.isFinite(+data.postMarketPrice) ? +data.postMarketPrice : (Number.isFinite(+data.preMarketPrice) ? +data.preMarketPrice : null));
          // After-hours percent is always computed against regular close.
          let extPct = null;
          if (ext != null && regular != null && regular !== 0) extPct = ((ext - regular) / regular) * 100;

          if (isAfterHours && ext != null && extPct != null && regular != null && regular !== 0 && ext !== regular) {
            const cls    = extPct > 0 ? 'up' : extPct < 0 ? 'down' : 'flat';
            const extFmt = ext.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            const pctFmt = (extPct > 0 ? '+' : '') + extPct.toFixed(2) + '%';
            afterEl.innerHTML =
              '<span class="after-hours-badge">' +
                'After Hrs&nbsp;<span class="after-hours-value ' + cls + '">' + extFmt + '</span>' +
                '&nbsp;<span class="after-hours-value ' + cls + '" style="font-size:0.82em;opacity:0.85">(' + pctFmt + ')</span>' +
              '</span>';
          } else {
            afterEl.innerHTML = '';
          }
        }
      } catch (e) { /* silent */ }
      startPolling(sym);
      wireTabs();
      // auto-open Fundamentals so content is immediately visible
      const firstBtn = document.querySelector('.tab-btn[data-tab="fundamentals"]');
      if (wireTabs._show) wireTabs._show('fundamentals', firstBtn);
      // Load sentiment and inject into fundamentals panel
      loadAndRenderSentiment(sym);
    } catch(e) {
      resultEl.innerHTML='<p style="color:#f87171;padding:20px 0">'+e.message+'</p>';
    } finally { setLoading(false); }
  }

  fetchBtn.addEventListener('click', doSearch);
  tickerInput.addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch(); });
  registerStocktwitsDefaultAuth().catch(() => {});
  wireInsightsStripButtons();
  loadMarketIndices();
  setInterval(loadMarketIndices, 5 * 60 * 1000);
  loadOverallHeadlines();
  setInterval(loadOverallHeadlines, 5 * 60 * 1000);
  
  // Load earnings and trending together early
  (async () => {
    try {
      console.log('[init] Loading earnings and trending...');
      await Promise.all([
        loadEarningsWeek(),
        loadStocktwitsTrending()
      ]);
      console.log('[init] Both data sources loaded, earnings sections:', _earningsStripSections.length);
    } catch (e) {
      console.error('[init] Error loading initial data:', e);
    }
  })();
  
  setInterval(loadStocktwitsTrending, 5 * 60 * 1000);
  setInterval(loadEarningsWeek, 30 * 60 * 1000);
  loadActiveOptions();
  setInterval(loadActiveOptions, 60 * 60 * 1000);
  // Auto-refresh ticker data every 5 minutes if a symbol is loaded
  setInterval(async () => {
    if (!_currentTicker || inFlight) return;
    const activeTabId = document.querySelector('.tab-btn.active')?.dataset?.tab || null;
    tickerInput.value = _currentTicker;
    _newsLoadedFor = '';
    await doSearch();
    if (activeTabId) {
      setTimeout(() => document.querySelector('.tab-btn[data-tab="'+activeTabId+'"]')?.click(), 200);
    }
  }, 5 * 60 * 1000);

</script>
</body>
</html>
