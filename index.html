<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Talk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0c0f18;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 18px 12px 60px;
    }

    .page { width: 100%; max-width: none; margin: 0; }

    /* ── Market Ticker Bar ── */
    .market-ticker-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      background: #0b1018;
      border: 1px solid #1e293b;
      border-radius: 14px;
      padding: 10px 18px;
      margin-bottom: 14px;
      align-items: center;
    }
    .mkt-item {
      display: inline-flex;
      align-items: baseline;
      gap: 5px;
      font-size: 0.82rem;
      white-space: nowrap;
    }
    .mkt-label { color: #64748b; font-weight: 600; letter-spacing: 0.02em; }
    .mkt-price { color: #e2e8f0; font-weight: 700; font-variant-numeric: tabular-nums; }
    .mkt-chg.up   { color: #34d399; }
    .mkt-chg.down { color: #f87171; }
    .mkt-chg.flat { color: #64748b; }
    .after-hours-badge { font-size: 0.95rem; color: #94a3b8; background: rgba(255,255,255,0.04); padding: 5px 12px; border-radius: 999px; display:inline-flex; align-items:center; gap:5px; border:1px solid rgba(255,255,255,0.07); }
    .after-hours-value.up { color: #34d399; font-weight:700; }
    .after-hours-value.down { color: #f87171; font-weight:700; }
    .after-hours-value.flat { color: #94a3b8; font-weight:700; }
    .mkt-sep { color: #1e293b; font-size: 0.9rem; user-select: none; }
    /* ── Market group pill buttons ── */
    .market-groups { display:flex; gap:8px; flex-wrap:wrap; align-items:center; width:100%; }
    .market-group-btn { padding:5px 12px; border-radius:999px; border:1.5px solid #1e293b; background:#0f1724; color:#94a3b8; font-size:0.72rem; font-weight:800; text-transform:uppercase; letter-spacing:0.07em; cursor:pointer; transition:all .18s; white-space:nowrap; }
    .market-group-btn:hover { border-color:#4f46e5; color:#c7d2fe; }
    .market-group-btn.active { background:linear-gradient(135deg,#4f46e5,#06b6d4); border-color:transparent; color:#fff; box-shadow:0 4px 16px rgba(79,70,229,0.3); }
    /* Shared content area below group buttons */
    .market-content-area { display:none; margin-top:8px; padding:10px 12px; background:#0b1018; border:1px solid #1e293b; border-radius:12px; }
    .market-content-area.visible { display:flex; flex-wrap:wrap; gap:6px 20px; }
    /* Compact row for each index inside content area */
    .market-row { display:inline-flex; align-items:center; gap:8px; padding:4px 8px; border-radius:8px; transition:background .12s; min-width:140px; }
    .market-row:hover { background:rgba(255,255,255,0.03); }
    .market-cell-label { color:#94a3b8; font-weight:700; font-size:0.76rem; min-width:60px; }
    .market-cell-price { color:#e2e8f0; font-weight:800; font-variant-numeric:tabular-nums; font-size:0.82rem; }
    .market-cell-chg { font-weight:700; font-size:0.76rem; min-width:70px; text-align:right; }

    /* ── Search bar ── */
    .search-wrap { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; }
    .search-wrap input {
      flex: 1 1 260px;
      padding: 13px 18px;
      border-radius: 14px;
      border: 1.5px solid #1e293b;
      background: #111827;
      color: #f1f5f9;
      font-size: 1rem;
      outline: none;
      transition: border-color .18s;
    }
    .search-wrap input:focus { border-color: #6366f1; }
    .search-wrap input::placeholder { color: #334155; }
    #fetchBtn {
      padding: 13px 28px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #6366f1 0%, #06b6d4 100%);
      color: #fff;
      font-weight: 700;
      font-size: 0.96rem;
      cursor: pointer;
      transition: opacity .18s, transform .12s;
      box-shadow: 0 6px 24px rgba(99,102,241,0.35);
    }
    #fetchBtn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    #fetchBtn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Sentiment UI */
    .sent-row { padding:8px 10px; border-radius:8px; background:rgba(255,255,255,0.02); display:flex; justify-content:space-between; gap:8px; align-items:center; }
    .sent-row strong { font-weight:800; font-size:0.9rem; }
    .sent-emoji { font-size:1.1rem; margin-left:6px }
    .sent-subrow { padding:6px 12px; color:#9aa7b9; font-size:0.86rem; border-left:2px solid rgba(255,255,255,0.03); margin:6px 0 6px 0; }
    .delta-up { color: #34d399; font-weight:700; }
    .delta-down { color: #f87171; font-weight:700; }
    .delta-neutral { color: #94a3b8; font-weight:700; }

    /* ── Price card ── */
    .price-card {
      background: linear-gradient(145deg, #111827 0%, #0f1629 100%);
      border: 1px solid #1e293b;
      border-radius: 22px;
      padding: 26px 28px 22px;
      margin-bottom: 16px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    }
    .company-name {
      font-size: 0.82rem; font-weight: 700; color: #7eb8e8;
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .company-name .ticker-sym {
      color: #f0f6ff; font-size: 1rem; font-weight: 900; letter-spacing: 0.05em;
    }
    .company-name .name-sep { color: #334155; }
     /* Table alignment fixes: use fixed table layout and normalize header buttons
       so header column widths match body column widths during horizontal scroll */
     #optionsHorizonTableArea table,
     table { table-layout: fixed; width: 100%; border-collapse: collapse; }
     #optionsHorizonTableArea th, #optionsHorizonTableArea td,
     th, td { padding: 4px 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
     /* Make header sort buttons not change layout when arrows toggle */
     .active-sort-btn { background: none; border: none; padding: 0; margin: 0; font: inherit; color: inherit; cursor: pointer; }
    .price-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .price-big { font-size: 56px; font-weight: 900; letter-spacing: -0.045em; line-height: 1; color: #f8fafc; }
    .pct-badge {
      font-size: 1rem; font-weight: 700;
      padding: 5px 15px; border-radius: 999px;
      display: inline-flex; align-items: center; gap: 3px;
    }
    .pct-positive { color: #34d399; background: rgba(52,211,153,0.12); border: 1px solid rgba(52,211,153,0.2); }
    .pct-negative { color: #f87171; background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.18); }
    .pct-neutral  { color: #64748b; background: rgba(100,116,139,0.1); border: 1px solid rgba(100,116,139,0.15); }
    .price-meta {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 10px;
    }
    .meta-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.82rem;
    }
    .meta-chip .meta-label { color: #7e95b0; font-weight: 600; white-space: nowrap; }
    .meta-chip .meta-value { color: #e2eaf4; font-weight: 800; white-space: nowrap; }
    .meta-chip .meta-high  { color: #34d399; font-weight: 800; }
    .meta-chip .meta-low   { color: #f87171; font-weight: 800; }

    /* ── Tab pill buttons ── */
    .tabs-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .tab-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border-radius: 999px;
      border: 1.5px solid #1e293b;
      background: #111827;
      color: #64748b;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all .2s ease;
      white-space: nowrap;
      user-select: none;
      letter-spacing: 0.01em;
    }
    .tab-icon { font-size: 0.95rem; }
    .tab-btn:hover {
      border-color: #4f46e5;
      color: #c7d2fe;
      background: #13163a;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79,70,229,0.18);
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 8px 28px rgba(79,70,229,0.38);
      transform: translateY(-2px);
    }

    /* ── Tab content area ── */
    .panel-inner-overflow { overflow: visible; }
    .panel-inner {
      background: #111827;
      border: 1.5px solid #1e293b;
      border-radius: 18px;
      padding: 22px 22px 20px;
      margin-top: 4px;
    }
    .panel-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: #4f46e5;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 16px;
    }

    /* ── Metric grid ── */
    .grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    }
    .metric {
      background: #0d1117;
      border: 1px solid #1e293b;
      border-radius: 13px;
      padding: 13px 15px;
      transition: border-color .18s, transform .15s;
    }
    .metric:hover { border-color: #334155; transform: translateY(-1px); }
    .m-label { font-size: 0.7rem; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
    .m-value { font-size: 1rem; font-weight: 700; color: #f1f5f9; }
    .reason-hl {
      display: inline-block;
      padding: 0 6px;
      border-radius: 999px;
      border: 1px solid transparent;
      line-height: 1.35;
      margin: 0 1px;
      font-weight: 800;
      letter-spacing: 0.01em;
    }
    .reason-hl-strategy {
      color: #e9d5ff;
      background: rgba(147, 51, 234, 0.15);
      border-color: rgba(147, 51, 234, 0.35);
      font-family: "Trebuchet MS", "Avenir Next", sans-serif;
    }
    .reason-hl-month {
      color: #67e8f9;
      background: rgba(14, 165, 233, 0.16);
      border-color: rgba(14, 165, 233, 0.35);
      font-family: "Trebuchet MS", "Avenir Next", sans-serif;
    }
    .reason-hl-strike {
      color: #86efac;
      background: rgba(34, 197, 94, 0.16);
      border-color: rgba(34, 197, 94, 0.35);
      font-family: "Trebuchet MS", "Avenir Next", sans-serif;
    }
    .reason-hl-premium {
      color: #facc15;
      background: rgba(250, 204, 21, 0.14);
      border-color: rgba(250, 204, 21, 0.35);
      font-family: "Trebuchet MS", "Avenir Next", sans-serif;
    }
    .reason-metric {
      width: 100%;
      margin-top: 10px;
    }
    .reason-metric .m-value {
      white-space: normal;
      word-break: break-word;
      line-height: 1.5;
      font-size: 0.92rem;
      font-weight: 650;
    }
    .reason-bullets {
      margin: 0;
      padding-left: 1.1rem;
      display: grid;
      gap: 6px;
    }
    .reason-bullets li::marker {
      color: #67e8f9;
    }
    .tip-wrap {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      cursor: help;
    }
    .tip {
      border-bottom: 1px dotted #64748b;
    }
    .tip-icon {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid #334155;
      background: #0b1220;
      color: #94a3b8;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
      line-height: 1;
      flex-shrink: 0;
    }
    #g-tip {
      position: fixed;
      z-index: 9999;
      background: #0b1220;
      color: #dbeafe;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.72rem;
      line-height: 1.45;
      max-width: 300px;
      pointer-events: none;
      box-shadow: 0 8px 24px rgba(0,0,0,.45);
      display: none;
      font-weight: 500;
      text-transform: none;
      letter-spacing: normal;
    }

    /* ── JSON pre ── */
    pre {
      background: #080b11;
      border: 1px solid #1e293b;
      border-radius: 13px;
      padding: 16px;
      overflow: auto;
      font-size: 0.8rem;
      color: #64748b;
      line-height: 1.65;
    }

    .news-list { display: grid; gap: 10px; margin-bottom: 14px; }
    .news-item {
      display: block;
      padding: 12px 14px;
      border: 1px solid #1e293b;
      border-radius: 12px;
      background: #0b1018;
      text-decoration: none;
      transition: border-color .18s, transform .15s;
    }
    .news-item:hover { border-color: #334155; transform: translateY(-1px); }
    .news-title { color: #dbeafe; font-size: 0.9rem; font-weight: 600; line-height: 1.4; margin-bottom: 5px; }
    .news-meta { color: #64748b; font-size: 0.78rem; }

    .headline-bar {
      position: relative;
      overflow: hidden;
      border: 1px solid #1e293b;
      border-radius: 12px;
      background: #0b1018;
      margin-bottom: 12px;
      padding: 10px 0;
    }
    .headline-bar::before,
    .headline-bar::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 64px;
      z-index: 2;
      pointer-events: none;
    }
    .headline-bar::before {
      left: 0;
      background: linear-gradient(90deg, #0b1018 0%, rgba(11, 16, 24, 0) 100%);
    }
    .headline-bar::after {
      right: 0;
      background: linear-gradient(270deg, #0b1018 0%, rgba(11, 16, 24, 0) 100%);
    }
    .headline-track {
      display: inline-flex;
      gap: 28px;
      white-space: nowrap;
      padding-left: 100%;
      animation: headline-scroll 191.25s linear infinite;
      will-change: transform;
    }
    /* Controls and unified grid */

    .headline-bar:hover .headline-track { animation-play-state: paused; }
    .headline-item {
      color: #cbd5e1;
      font-size: 0.83rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .headline-item:hover { color: #e2e8f0; }
    .headline-source {
      color: #38bdf8;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .headline-time { color: #64748b; }

    .social-trending-strip {
      border: 1px solid #1e293b;
      border-radius: 14px;
      background: linear-gradient(135deg, #0a1324 0%, #101a30 55%, #0f2232 100%);
      margin-bottom: 14px;
      padding: 12px 14px;
    }
    .social-trending-head {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .social-trending-title {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .social-trending-title .social-chevron { font-size: 0.6rem; transition: transform .2s; display: inline-block; }
    .social-trending-strip.hidden .social-chevron { transform: rotate(-90deg); }
    .social-trending-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .social-trending-strip.hidden .social-trending-list { display: none; }
    .social-trending-strip.hidden .social-trending-head { margin-bottom: 0; }
    .social-trending-strip.hidden { padding-bottom: 8px; }
    .social-chip {
      border: 1px solid #22435f;
      background: rgba(10, 18, 32, 0.75);
      color: #dbeafe;
      border-radius: 999px;
      padding: 7px 10px;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: transform .15s, border-color .2s, box-shadow .2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .social-chip:hover {
      transform: translateY(-1px);
      border-color: #38bdf8;
      box-shadow: 0 8px 20px rgba(56, 189, 248, 0.2);
    }
    .social-chip-rank {
      color: #93c5fd;
      margin-right: 6px;
      font-size: 0.72rem;
      font-weight: 800;
    }

    /* Trend Direction Indicators */
    .social-chip.bullish {
      border-color: #34d399;
      color: #34d399;
      background: rgba(52, 211, 153, 0.08);
    }
    .social-chip.bullish:hover {
      border-color: #34d399;
      box-shadow: 0 8px 20px rgba(52, 211, 153, 0.25);
    }
    .social-chip.bearish {
      border-color: #f87171;
      color: #f87171;
      background: rgba(248, 113, 113, 0.08);
    }
    .social-chip.bearish:hover {
      border-color: #f87171;
      box-shadow: 0 8px 20px rgba(248, 113, 113, 0.25);
    }
    .chip-direction {
      font-size: 0.9rem;
      font-weight: 900;
      margin-right: 4px;
    }
    .chip-price {
      font-size: 0.72rem;
      color: #cbd5e1;
      font-weight: 700;
      margin-left: 4px;
    }
    .chip-session {
      font-size: 0.64rem;
      color: #94a3b8;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-left: 3px;
    }

    /* ── Earnings Panel ── */
    .earnings-panel { width: 100%; }
    .earnings-day-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .earnings-day-tab {
      background: rgba(255,255,255,0.04);
      border: 1px solid #1e3250;
      color: #94a3b8;
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .earnings-day-tab:hover { border-color: #38bdf8; color: #e0f2fe; }
    .earnings-day-tab.active {
      background: rgba(56,189,248,0.15);
      border-color: #38bdf8;
      color: #e0f2fe;
    }
    .earnings-day-tab.today-tab {
      border-color: #6366f1;
      color: #a5b4fc;
    }
    .earnings-day-tab.today-tab.active {
      background: rgba(99,102,241,0.18);
      border-color: #6366f1;
      color: #c7d2fe;
    }
    .earnings-grid {
      width: 100%;
      overflow-x: auto;
    }
    .earnings-grid-inner { display: inline-block; min-width: max-content; }
    .earnings-grid-rows {
      max-height: 340px; /* enforce ~10 visible rows, scroll for the rest */
      overflow-y: auto;
      margin-top: 8px;
      padding-right: 6px;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    .earnings-grid-header,
    .earnings-grid-row {
      display: grid;
      grid-template-columns: 72px 130px 52px 82px 72px 72px 72px;
      gap: 8px;
      align-items: center;
      padding: 4px 6px;
      border-radius: 6px;
      font-size: 0.78rem;
    }
    .earnings-grid-header {
      color: #64748b;
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 5px;
    }
    .earnings-sort-btn {
      appearance: none;
      background: transparent;
      border: 0;
      color: inherit;
      font: inherit;
      text-transform: inherit;
      letter-spacing: inherit;
      cursor: pointer;
      text-align: left;
      padding: 0;
      width: 100%;
    }
    .earnings-sort-btn.active { color: #cbd5e1; }
    .earnings-grid-row {
      cursor: pointer;
      border: 1px solid transparent;
      transition: background .12s, border-color .12s;
      margin-bottom: 1px;
      min-height: 32px;
    }
    .earnings-grid-row:hover {
      background: rgba(56,189,248,0.07);
      border-color: #22435f;
    }
    .earnings-grid-row.sp500-row .eg-symbol { color: #93c5fd; font-weight: 800; }
    .eg-symbol { font-weight: 800; font-size: 0.82rem; color: #dbeafe; }
    .eg-company { font-size: 0.72rem; color: #94a3b8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .eg-sp { font-weight: 700; font-size: 0.72rem; color: #94a3b8; }
    .eg-time { display: flex; align-items: center; gap: 4px; font-size: 0.73rem; font-weight: 700; }
    .eg-time.bmo { color: #fbbf24; }
    .eg-time.amc { color: #818cf8; }
    .eg-implied { font-size: 0.75rem; font-weight: 700; color: #94a3b8; }
    .eg-avg { font-size: 0.75rem; font-weight: 700; }
    .eg-last { font-size: 0.75rem; font-weight: 700; }
    .eg-pos { color: #34d399; }
    .eg-neg { color: #f87171; }
    .eg-na  { color: #475569; }
    .earnings-empty { color: #475569; font-size: 0.82rem; padding: 8px 0; }
    .earnings-week-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      gap: 8px;
    }
    .earnings-week-nav-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid #1e3a5f;
      color: #7dd3fc;
      border-radius: 8px;
      padding: 5px 14px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
    }
    .earnings-week-nav-btn:hover { background: rgba(56,189,248,0.12); border-color: #38bdf8; color: #e0f2fe; }

    .active-options-grid {
      width: 100%;
      overflow-x: auto;
      flex: 1 1 100%;
    }
    .active-options-grid-rows {
      max-height: 340px;
      overflow-y: auto;
      margin-top: 8px;
      padding-right: 6px;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    .active-options-grid-header,
    .active-options-grid-row {
      display: grid;
      grid-template-columns: 90px 70px 100px 72px 96px 92px 120px;
      gap: 8px;
      align-items: center;
      padding: 4px 6px;
      border-radius: 6px;
      font-size: 0.78rem;
    }
    .active-options-grid-header {
      color: #64748b;
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 5px;
    }
    .active-options-grid-row {
      cursor: pointer;
      border: 1px solid transparent;
      transition: background .12s, border-color .12s;
      margin-bottom: 1px;
      min-height: 32px;
    }
    .active-options-grid-row:hover {
      background: rgba(56,189,248,0.07);
      border-color: #22435f;
    }
    .active-sort-btn {
      appearance: none;
      background: transparent;
      border: 0;
      color: inherit;
      font: inherit;
      text-transform: inherit;
      letter-spacing: inherit;
      cursor: pointer;
      text-align: left;
      padding: 0;
      width: 100%;
    }
    .active-sort-btn.active { color: #cbd5e1; }

    @keyframes headline-scroll {
      from { transform: translateX(0); }
      to { transform: translateX(-100%); }
    }

    .news-skeleton { display: grid; gap: 10px; }
    .news-skeleton-row {
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 12px 14px;
      background: #0b1018;
    }
    .skeleton-bar {
      height: 11px;
      border-radius: 8px;
      background: linear-gradient(90deg, #111827 25%, #1f2937 50%, #111827 75%);
      background-size: 200% 100%;
      animation: shimmer 1.1s linear infinite;
    }
    .skeleton-title { width: 92%; margin-bottom: 8px; }
    .skeleton-title.short { width: 66%; }
    .skeleton-meta { width: 42%; height: 9px; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .dimtext { color: #475569; font-size: 0.84rem; }
    .loading-msg { color: #475569; padding: 48px 0; text-align: center; font-size: 0.95rem; letter-spacing: 0.02em; }

    /* Responsive adjustments */
    @media (max-width: 900px) {
      body { padding: 14px 10px 50px; }
      .market-ticker-bar { padding: 8px 12px; }
      .market-group { padding: 6px 8px; }
      .mkt-item { font-size: 0.78rem; gap:6px }
      .headline-track { gap: 18px; }
      .price-big { font-size: 44px; }
    }

    @media (max-width: 520px) {
      .search-wrap input { flex-basis: 100%; }
      .market-groups { gap:8px; }
      .group-label { display:none; }
      .market-ticker-bar { padding: 6px 8px; }
      .mkt-item { font-size: 0.72rem; }
      .headline-track { gap: 12px; }
      .price-big { font-size: 36px; }
      .page { padding-left: 8px; padding-right: 8px; }
    }
  </style>
</head>
<body>
<div class="page">

  <div id="marketTickerBar" class="market-ticker-bar"></div>

  <div class="headline-bar"><div id="overallHeadlines"></div></div>

  <div class="social-trending-strip hidden" id="insightsStrip">
    <div class="social-trending-head">
      <button class="social-trending-title market-group-btn" id="socialToggleTitle" type="button">Trending in Social <span class="social-chevron">&#x25BE;</span></button>
      <button class="social-trending-title market-group-btn" id="earningsToggleTitle" type="button">Earnings <span class="social-chevron">&#x25BE;</span></button>
      <button class="social-trending-title market-group-btn" id="activeOptionsToggleTitle" type="button">Most Active Options <span class="social-chevron">&#x25BE;</span></button>
    </div>
    <div id="insightsStripContent" class="social-trending-list">
      <span class="dimtext">Loading trending symbols...</span>
    </div>
  </div>

  <div class="search-wrap">
    <input id="ticker" placeholder="Search with ticker or name eg: NVDA, Nvidia" autocomplete="off" spellcheck="false" />
    <button id="fetchBtn">Search</button>
  </div>

  <div id="result"></div>

</div>
<script>
  const tickerInput = document.getElementById('ticker');
  const fetchBtn    = document.getElementById('fetchBtn');
  const resultEl    = document.getElementById('result');

  let inFlight = false, _poll = null, _prevClose = null, _cur = '';
  let _currentTicker = '', _currentCompanyName = '', _newsLoadedFor = '', _newsLoading = false;
  let _currentEarningsDate = null;
  let _recommendationLoadedFor = '';
  let _recommendationRiskMode = 'balanced';
  let _recommendationTrack = '';
  let _recommendationHorizon = 'all';
  let _recommendationCache = {};
  let _initialTrendingConsumed = false;
  let _tickerOptionsLoadedFor = '';
  let _insightsStripMode = null;
  let _trendingStripSymbols = [];
  let _trendingStripUnavailable = false;
  let _earningsStripSections = [];
  let _earningsNextWeekSections = [];
  let _earningsWeekOffset = 0; // 0 = current week, 1 = next week
  let _earningsWeekNotice = '';
  let _earningsStripUnavailable = false;
  let _earningsSelectedDate = null;
  let _earningsSortKey = 'spname';
  let _earningsSortDir = 'asc';
  let _activeOptionsItems = [];
  let _activeOptionsSortKey = 'optionVolume';
  let _activeOptionsSortDir = 'desc';
  let _activeOptionsUnavailable = false;

  function setLoading(s) {
    inFlight = s;
    fetchBtn.disabled = s;
    fetchBtn.textContent = s ? 'Loading\u2026' : 'Search';
  }

  /* ── formatters ── */
  const fv  = v => (v == null || !Number.isFinite(+v)) ? 'N/A' : (+v).toFixed(2);
  const frt = v => v == null ? 'N/A' : ((+v)*100).toFixed(2)+'%';
  const fB  = v => { if(v==null) return 'N/A'; const n=+v; return Number.isFinite(n)?(n/1e9).toFixed(2)+'B':'N/A'; };
  const fM  = v => {
    if(v==null) return 'N/A'; const n=+v; if(!Number.isFinite(n)) return 'N/A';
    if(Math.abs(n)>=1e12) return (n/1e12).toFixed(2)+'T';
    if(Math.abs(n)>=1e9)  return (n/1e9).toFixed(2)+'B';
    if(Math.abs(n)>=1e6)  return (n/1e6).toFixed(2)+'M';
    return n.toLocaleString();
  };
  const clean = v => !v ? '' : String(v).replace(/\s*[-\u2014]?\s*Yahoo Finance\b/ig,'').replace(/\s+/g,' ').trim();
  const stripCompanySuffixes = v => clean(v)
    .replace(/\b(inc\.?|corp\.?|corporation|company|co\.?|limited|ltd\.?|plc|holdings?)\b/ig, '')
    .replace(/\s+/g, ' ')
    .trim();
  const fR    = (l,s) => !l ? 'N/A' : (s!=null ? l+' ('+s.toFixed(1)+')' : l);
  const fDate = ts => {
    if (ts == null || ts === '' || ts === false) return '\u2014';
    // Handle ISO strings (e.g. "2026-04-30T20:00:00.000Z") directly
    if (typeof ts === 'string') {
      const d = new Date(ts);
      return isNaN(d.getTime()) ? '\u2014' : d.toLocaleDateString(undefined, {year:'numeric',month:'short',day:'numeric'});
    }
    // Handle numeric unix timestamps (seconds < 1e11, or ms >= 1e11)
    const n = +ts;
    if (!Number.isFinite(n) || n <= 0) return '\u2014';
    const ms = n >= 1e11 ? n : n * 1000;
    const d  = new Date(ms);
    return isNaN(d.getTime()) ? '\u2014' : d.toLocaleDateString(undefined, {year:'numeric',month:'short',day:'numeric'});
  };
  const m     = (lbl, val) => '<div class="metric"><div class="m-label">'+lbl+'</div><div class="m-value">'+val+'</div></div>';
  const tl    = (label, help) => '<span class="tip-wrap" tabindex="0" data-tip="'+escapeHtml(help)+'"><span class="tip">'+label+'</span><span class="tip-icon" aria-hidden="true">i</span></span>';
  const formatRecommendationReason = (reason, overallVerdict) => {
    const raw = String(reason || 'Insufficient data to build reason string.');
    let html = escapeHtml(raw);

    // Emphasize key strategy terms so traders can scan reasoning quickly.
    if (String(overallVerdict || '').toUpperCase() === 'BULLISH (SELL PUT SPREADS)') {
      html = html
        .replace(/Sell\s+([A-Za-z]+)\s+Bull Put Spreads/i,
          '<span class="reason-hl reason-hl-strategy">Sell</span> <span class="reason-hl reason-hl-month">$1</span> <span class="reason-hl reason-hl-strategy">Bull Put Spreads</span>')
        .replace(/targeting the\s+(\$\d+(?:\.\d+)?)\s+structural support zone/i,
          'targeting the <span class="reason-hl reason-hl-strike">$1</span> structural support zone')
        .replace(/premium yield\s*\((\$\d+(?:\.\d+)?)\)/i,
          '<span class="reason-hl reason-hl-premium">premium yield</span> (<span class="reason-hl reason-hl-premium">$1</span>)')
        .replace(/premium yield/i, '<span class="reason-hl reason-hl-premium">premium yield</span>');
    } else if (String(overallVerdict || '').toUpperCase() === 'BULLISH (BUY CALLS)') {
      html = html
        .replace(/Buy the\s+([A-Za-z]+)\s+(\$\d+(?:\.\d+)?)\s+Call outright/i,
          '<span class="reason-hl reason-hl-strategy">Buy</span> the <span class="reason-hl reason-hl-month">$1</span> <span class="reason-hl reason-hl-strike">$2</span> <span class="reason-hl reason-hl-strategy">Call outright</span>')
        .replace(/targeting the overhead\s+(\$\d+(?:\.\d+)?)\s+Call Wall/i,
          'targeting the overhead <span class="reason-hl reason-hl-strike">$1</span> <span class="reason-hl reason-hl-strategy">Call Wall</span>')
        .replace(/estimated\s+(\d+(?:\.\d+)?%)\s+chance/i,
          'estimated <span class="reason-hl reason-hl-premium">$1</span> chance');
    } else if (String(overallVerdict || '').toUpperCase() === 'NEUTRAL (IRON CONDORS)') {
      html = html
        .replace(/Expect\s+range(?:-|\u2010|\u2011|\u2012|\u2013|\u2014|\u2015)bound\s+consolidation\s+between\s+(\$\d+(?:\.\d+)?)\s+and\s+(\$\d+(?:\.\d+)?)([.!?])?/i,
          '<span class="reason-hl reason-hl-strategy">Expect range-bound consolidation</span> between <span class="reason-hl reason-hl-strike">$1</span> and <span class="reason-hl reason-hl-strike">$2</span>')
        .replace(/Deploy\s+Iron Condors/i,
          '<span class="reason-hl reason-hl-strategy">Deploy Iron Condors</span>');
    }

    // Fallback highlight pass (verdict-independent) for neutral range phrases.
    html = html
      .replace(/Spot\s*\((\$\d+(?:\.\d+)?)\)\s*is pinned within\s*(\d+(?:\.\d+)?%)\s*of Max Pain\s*\((\$\d+(?:\.\d+)?)\)/i,
        'Spot <span class="reason-hl reason-hl-strike">($1)</span> is pinned within <span class="reason-hl reason-hl-premium">$2</span> of Max Pain <span class="reason-hl reason-hl-strike">($3)</span>')
      .replace(/Expect\s+range(?:-|\u2010|\u2011|\u2012|\u2013|\u2014|\u2015)bound\s+consolidation\s+between\s+(\$\d+(?:\.\d+)?)\s+and\s+(\$\d+(?:\.\d+)?)([.!?])?/i,
        '<span class="reason-hl reason-hl-strategy">Expect range-bound consolidation</span> between <span class="reason-hl reason-hl-strike">$1</span> and <span class="reason-hl reason-hl-strike">$2</span>')
      .replace(/Expect\s+range\s*[-\u2010\u2011\u2012\u2013\u2014\u2015]?\s*bound\s+consolidation\s+between\s+(\$\d+(?:\.\d+)?)\s+and\s+(\$\d+(?:\.\d+)?)([.!?])?/i,
        '<span class="reason-hl reason-hl-strategy">Expect range-bound consolidation</span> between <span class="reason-hl reason-hl-strike">$1</span> and <span class="reason-hl reason-hl-strike">$2</span>')
      .replace(/Deploy\s+Iron Condors/i,
        '<span class="reason-hl reason-hl-strategy">Deploy Iron Condors</span>');

    const bulletItems = html
      .split(/\n+/)
      .map((line) => line.trim())
      .filter(Boolean)
      .map((line) => line.replace(/^[-•]\s*/, ''));

    const finalItems = bulletItems.length
      ? bulletItems.slice(0, 4)
      : [html];

    return '<ul class="reason-bullets">'
      + finalItems.map((line) => '<li>' + line + '</li>').join('')
      + '</ul>';
  };
  const newsHtml = (news) => {
    if (!Array.isArray(news) || news.length === 0) {
      return '<p class="dimtext">No recent news found.</p>';
    }
    return '<div class="news-list">' + news.map(item => {
      const title = item.title || 'Untitled';
      const source = item.source || 'Unknown source';
      const time = item.relativeTime || 'Unknown time';
      const url = item.url || '#';
      return '<a class="news-item" href="'+url+'" target="_blank" rel="noopener noreferrer">'
        + '<div class="news-title">'+title+'</div>'
        + '<div class="news-meta">'+source+' · '+time+'</div>'
        + '</a>';
    }).join('') + '</div>';
  };

  const newsSkeletonHtml = () => {
    return '<div class="news-skeleton">'
      + '<div class="news-skeleton-row"><div class="skeleton-bar skeleton-title"></div><div class="skeleton-bar skeleton-title short"></div><div class="skeleton-bar skeleton-meta"></div></div>'
      + '<div class="news-skeleton-row"><div class="skeleton-bar skeleton-title"></div><div class="skeleton-bar skeleton-meta"></div></div>'
      + '<div class="news-skeleton-row"><div class="skeleton-bar skeleton-title"></div><div class="skeleton-bar skeleton-title short"></div><div class="skeleton-bar skeleton-meta"></div></div>'
      + '</div>';
  };

  const overallTickerHtml = (news) => {
    if (!Array.isArray(news) || news.length === 0) {
      return '<p class="dimtext" style="padding:0 12px">No latest market headlines right now.</p>';
    }
    const itemHtml = news.slice(0, 10).map(item => {
      const title = item.title || 'Untitled';
      const source = item.source || 'Unknown';
      const time = item.relativeTime || '';
      const url = item.url || '#';
      return '<a class="headline-item" href="'+url+'" target="_blank" rel="noopener noreferrer">'
        + '<span class="headline-source">'+source+'</span>'
        + '<span>'+title+'</span>'
        + (time ? '<span class="headline-time">('+time+')</span>' : '')
        + '</a>';
    }).join('');

    // Duplicate content once for smooth looping.
    return '<div class="headline-track">'+itemHtml+itemHtml+'</div>';
  };

  const trendingStocktwitsHtml = (symbols) => {
    if (!Array.isArray(symbols) || symbols.length === 0) {
      return '<span class="dimtext">No trending symbols right now.</span>';
    }
    return symbols.slice(0, 10).map((s, i) => {
      const sym = s.symbol || 'N/A';
      const title = s.title || '';
      const direction = s.direction || 'neutral'; // bullish, bearish, or neutral
      const arrow = s.arrow || '●';
      const price = Number.isFinite(+s.displayPrice) ? (+s.displayPrice).toLocaleString('en-US', { maximumFractionDigits: 2, minimumFractionDigits: 2 }) : null;
      const session = s.displaySession || '';
      const activePct = Number.isFinite(+s.displayChangePct)
        ? +s.displayChangePct
        : (session === 'After Hours' && Number.isFinite(+s.extendedChangePct)
            ? +s.extendedChangePct
            : (Number.isFinite(+s.regularChangePct) ? +s.regularChangePct : null));
      const pct = activePct != null ? ((activePct > 0 ? '+' : '') + activePct.toFixed(2) + '%') : '';
      const priceAndPct = [price ? ('$'+price) : '', pct ? (price ? (' ('+pct+')') : pct) : ''].join('');
      return '<button class="social-chip '+direction+'" data-st-symbol="'+escapeHtml(sym)+'" title="'+escapeHtml(title)+'">'
        + '<span class="social-chip-rank">#'+(i + 1)+'</span>'
        + '<span class="chip-direction">'+arrow+'</span>'
        + '<span>'+escapeHtml(sym)+'</span>'
        + (priceAndPct ? ('<span class="chip-price">'+priceAndPct+'</span>') : '')
        + (session ? ('<span class="chip-session">'+escapeHtml(session)+'</span>') : '')
        + '</button>';
    }).join('');
  };

  function wireTrendingSymbolsButtons() {
    document.querySelectorAll('[data-st-symbol]').forEach((btn) => {
      btn.onclick = () => {
        const sym = btn.getAttribute('data-st-symbol');
        if (!sym) return;
        tickerInput.value = sym;
        doSearch();
        // Close the insights strip when a trending symbol is clicked
        try { setInsightsStripMode('trending'); } catch (_) {}
      };
    });
  }

  function consumeInitialTrendingSymbols() {
    if (_initialTrendingConsumed) return null;
    const initial = window.INITIAL_TRENDING_DATA;
    const symbols = Array.isArray(initial)
      ? initial
      : (Array.isArray(initial?.symbols) ? initial.symbols : null);
    if (!symbols || symbols.length === 0) return null;
    _initialTrendingConsumed = true;
    return symbols;
  }

  function formatEarningsDateLabel(dateIso) {
    const d = new Date(dateIso + 'T00:00:00');
    if (Number.isNaN(d.getTime())) return dateIso;
    return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
  }

  function earningsHourLabel(hour) {
    const v = String(hour || '').toLowerCase();
    if (v === 'bmo') return 'BMO';
    if (v === 'amc') return 'AMC';
    return 'TBD';
  }

  function normalizeEarningsSections(payload) {
    try {
      const days = payload && typeof payload.days === 'object' && payload.days ? payload.days : {};
      const allDates = Object.keys(days).sort();
      if (allDates.length === 0) return [];

      return allDates.map((dateIso) => {
        const rows = Array.isArray(days[dateIso]) ? days[dateIso] : [];
        const sortedRows = rows.slice().sort((a, b) => {
          const aSp = a && a.isSp500 ? 1 : 0;
          const bSp = b && b.isSp500 ? 1 : 0;
          if (aSp !== bSp) return bSp - aSp;
          return String(a?.symbol || '').localeCompare(String(b?.symbol || ''));
        });
        return { dateIso, dateLabel: formatEarningsDateLabel(dateIso), rows: sortedRows };
      }).filter((x) => x.rows.length > 0);
    } catch (e) {
      console.error('[earnings] normalizeEarningsSections error:', e);
      return [];
    }
  }

  function earningsStripHtml(sections, selectedDate) {
    if (!Array.isArray(sections) || sections.length === 0) {
      return '<span class="dimtext">No earnings schedule available right now.</span>';
    }

    const today = new Date().toISOString().slice(0, 10);
    // Default to today if in sections, else nearest future date, else first date
    if (!selectedDate || !sections.find(s => s.dateIso === selectedDate)) {
      const todaySection = sections.find(s => s.dateIso === today);
      const futureSection = sections.find(s => s.dateIso >= today);
      selectedDate = (todaySection || futureSection || sections[0]).dateIso;
    }
    _earningsSelectedDate = selectedDate;

    // Day tabs
    const tabs = sections.map(s => {
      const isToday = s.dateIso === today;
      const isActive = s.dateIso === selectedDate;
      const cls = ['earnings-day-tab', isToday ? 'today-tab' : '', isActive ? 'active' : ''].filter(Boolean).join(' ');
      const label = isToday ? s.dateLabel + ' ✦' : s.dateLabel;
      return `<button class="${cls}" data-edate="${escapeHtml(s.dateIso)}" type="button">${escapeHtml(label)}</button>`;
    }).join('');
    const weekNavBtn = _earningsWeekOffset > 0
      ? '<button class="earnings-week-nav-btn" id="earningsPrevWeekBtn" type="button">&#8592; Current Week</button>'
      : '<button class="earnings-week-nav-btn" id="earningsNextWeekBtn" type="button">Next Week &#8594;</button>';

    // Grid for selected section
    const section = sections.find(s => s.dateIso === selectedDate);
    let grid = '';
    if (!section || section.rows.length === 0) {
      grid = '<div class="earnings-empty">No earnings on this date.</div>';
    } else {
      const parseImpliedMove = (v) => {
        if (v == null || v === '') return null;
        const m = String(v).match(/-?\d+(?:\.\d+)?/);
        return m ? Number(m[0]) : null;
      };
      const hourRank = (h) => {
        const v = String(h || '').toLowerCase();
        if (v === 'bmo') return 0;
        if (v === 'amc') return 1;
        return 2;
      };
      const rowVal = (row, key) => {
        if (key === 'symbol') return String(row?.symbol || '');
        if (key === 'company') return String(row?.companyName || row?.symbol || '').toLowerCase();
        if (key === 'spname') return [row?.isSp500 ? 0 : 1, String(row?.companyName || row?.symbol || '').toLowerCase()];
        if (key === 'time') return hourRank(row?.hour);
        if (key === 'implied') return parseImpliedMove(row?.impliedMove);
        if (key === 'avg') {
          const n = Number(row?.avgLast4EarningsMove);
          return Number.isFinite(n) ? n : null;
        }
        if (key === 'last') {
          const n = Number(row?.lastEarningsMove);
          return Number.isFinite(n) ? n : null;
        }
        return null;
      };
      const compareValues = (av, bv) => {
        if (Array.isArray(av) || Array.isArray(bv)) {
          const aArr = Array.isArray(av) ? av : [av];
          const bArr = Array.isArray(bv) ? bv : [bv];
          const len = Math.max(aArr.length, bArr.length);
          for (let i = 0; i < len; i++) {
            const res = compareValues(aArr[i], bArr[i]);
            if (res !== 0) return res;
          }
          return 0;
        }
        if (av == null && bv == null) return 0;
        if (av == null) return 1;
        if (bv == null) return -1;
        if (typeof av === 'string' || typeof bv === 'string') return String(av || '').localeCompare(String(bv || ''));
        return av - bv;
      };

      const sortedRows = section.rows.slice().sort((a, b) => {
        const av = rowVal(a, _earningsSortKey);
        const bv = rowVal(b, _earningsSortKey);
        let cmp = compareValues(av, bv);

        if (cmp === 0) {
          cmp = String(a?.symbol || '').localeCompare(String(b?.symbol || ''));
        }
        return _earningsSortDir === 'asc' ? cmp : -cmp;
      });

      const sortArrow = (key) => {
        if (_earningsSortKey !== key) return '';
        return _earningsSortDir === 'asc' ? ' ▲' : ' ▼';
      };
      const sortBtn = (key, label) => {
        const active = _earningsSortKey === key ? ' active' : '';
        return `<button type="button" class="earnings-sort-btn${active}" data-esort="${key}">${label}${sortArrow(key)}</button>`;
      };
      const header = '<div class="earnings-grid-header">'
        + `<span>${sortBtn('symbol', 'Symbol')}</span>`
        + `<span>${sortBtn('company', 'Company')}</span>`
        + `<span>${sortBtn('spname', 'In S&P')}</span>`
        + `<span>${sortBtn('time', 'Time')}</span>`
        + `<span>${sortBtn('implied', 'Implied')}</span>`
        + `<span>${sortBtn('avg', 'Avg 4Q')}</span>`
        + `<span>${sortBtn('last', 'Last Q')}</span>`
        + '</div>';

      // Build all rows but render inside a scrollable container limited to ~10 visible rows
      const rows = sortedRows.map(row => {
        const sym = row?.symbol || 'N/A';
        const isSp = row?.isSp500 ? ' sp500-row' : '';
        const hour = String(row?.hour || '').toLowerCase();
        const timeLabel = hour === 'bmo' ? 'BeforeMarket' : 'AfterMarket';
        const timeCls = 'eg-time ' + (hour === 'bmo' ? 'bmo' : hour === 'amc' ? 'amc' : '');

        const impliedRaw = row?.impliedMove;
        const impliedStr = impliedRaw ? escapeHtml(String(impliedRaw)) : '<span class="eg-na">—</span>';

        const avgRaw = Number(row?.avgLast4EarningsMove);
        const avgStr = Number.isFinite(avgRaw)
          ? `<span class="${avgRaw >= 0 ? 'eg-pos' : 'eg-neg'}">${avgRaw >= 0 ? '+' : ''}${Math.abs(avgRaw).toFixed(1)}%</span>`
          : '<span class="eg-na">—</span>';

        const lastRaw = Number(row?.lastEarningsMove);
        const lastStr = Number.isFinite(lastRaw)
          ? `<span class="${lastRaw >= 0 ? 'eg-pos' : 'eg-neg'}">${lastRaw >= 0 ? '+' : ''}${lastRaw.toFixed(1)}%</span>`
          : '<span class="eg-na">—</span>';

        const spYes = row?.isSp500 ? 'Yes' : 'No';
        const companyDisplay = escapeHtml(String(row?.companyName || row?.symbol || ''));
        return `<div class="earnings-grid-row${isSp}" data-earnings-symbol="${escapeHtml(sym)}" role="button" tabindex="0">`
          + `<span class="eg-symbol">${escapeHtml(sym)}</span>`
          + `<span class="eg-company" title="${companyDisplay}">${companyDisplay}</span>`
          + `<span class="eg-sp">${escapeHtml(spYes)}</span>`
          + `<span class="${timeCls}">${timeLabel}</span>`
          + `<span class="eg-implied">${impliedStr}</span>`
          + `<span class="eg-avg">${avgStr}</span>`
          + `<span class="eg-last">${lastStr}</span>`
          + `</div>`;
      }).join('');

      const visibleRows = 10;
      const rowHeightPx = 34;
      const rowsContainerStyle = section.rows.length > visibleRows
        ? ` style="max-height:${visibleRows * rowHeightPx}px"`
        : '';

      grid = `<div class="earnings-grid"><div class="earnings-grid-inner">${header}<div class="earnings-grid-rows"${rowsContainerStyle}>${rows}</div></div></div>`;
    }

    const noticeHtml = _earningsWeekNotice ? `<div class="earnings-empty">${escapeHtml(_earningsWeekNotice)}</div>` : '';
    return `<div class="earnings-panel"><div class="earnings-day-tabs">${tabs}${weekNavBtn}</div>${noticeHtml}${grid}</div>`;
  }

  function renderInsightsStripContent() {
    const container = document.getElementById('insightsStripContent');
    if (!container) return;

    if (_insightsStripMode === 'earnings') {
      const sections = _earningsWeekOffset === 1 ? _earningsNextWeekSections : _earningsStripSections;
      container.innerHTML = earningsStripHtml(sections, _earningsSelectedDate);
      wireEarningsSymbolsButtons();
      return;
    }

    if (_insightsStripMode === 'activeOptions') {
      container.innerHTML = activeOptionsStripHtml(_activeOptionsItems);
      wireActiveOptionsButtons();
      return;
    }

    if (_trendingStripUnavailable && _trendingStripSymbols.length === 0) {
      container.innerHTML = '<span class="dimtext">Unavailable</span>';

    }

  function setInsightsStripMode(nextMode) {
    const strip = document.getElementById('insightsStrip');
    const socialBtn = document.getElementById('socialToggleTitle');
    const earningsBtn = document.getElementById('earningsToggleTitle');
    const activeOptionsBtn = document.getElementById('activeOptionsToggleTitle');
    if (!strip || !socialBtn || !earningsBtn || !activeOptionsBtn) return;

    if (_insightsStripMode === nextMode) {
      _insightsStripMode = null;
      strip.classList.add('hidden');
      socialBtn.classList.remove('active');
      earningsBtn.classList.remove('active');
      activeOptionsBtn.classList.remove('active');
      return;
    }

    _insightsStripMode = nextMode;
    strip.classList.remove('hidden');
    socialBtn.classList.toggle('active', nextMode === 'trending');
    earningsBtn.classList.toggle('active', nextMode === 'earnings');
    activeOptionsBtn.classList.toggle('active', nextMode === 'activeOptions');
    renderInsightsStripContent();

  function wireInsightsStripButtons() {
    const socialBtn = document.getElementById('socialToggleTitle');

  async function loadStocktwitsTrending() {
    const initialSymbols = consumeInitialTrendingSymbols();
    if (initialSymbols) {
      _trendingStripSymbols = initialSymbols;
      if (_insightsStripMode === 'trending') renderInsightsStripContent();
    }

    try {
      let res = await fetch('/api/trending', getStocktwitsFetchOptions());
      if (!res.ok) {
        res = await fetch('/api/social/trending' + getStocktwitsQueryString(), getStocktwitsFetchOptions());
      }
      const data = await res.json();
      if (data && !data.error && Array.isArray(data.symbols)) {
        _trendingStripSymbols = data.symbols;
        if (_insightsStripMode === 'trending') renderInsightsStripContent();
      }
    } catch (_) {
      // silently fail - let the UI show "unavailable" message
    }
  }

  async function loadEarningsWeek(offset = 0) {
    try {
      const url = offset === 1 ? '/api/earnings/next-week' : '/api/earnings/week';
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), offset === 1 ? 15000 : 20000);
      const res = await fetch(url, { signal: controller.signal });
      clearTimeout(timeoutId);
      if (!res.ok) throw new Error('earnings_week_http_' + res.status);
      const payload = await res.json();
      const sections = normalizeEarningsSections(payload);
      if (offset === 1) {
        _earningsNextWeekSections = sections;
      } else {
        _earningsStripSections = sections;
        _earningsWeekNotice = '';
      }
      if (_insightsStripMode === 'earnings') renderInsightsStripContent();
    } catch (err) {
      console.error('[earnings] loadEarningsWeek error:', err);
      if (offset === 1) {
        _earningsNextWeekSections = [];
        _earningsWeekNotice = 'Unable to load later week right now.';
      }
      else _earningsStripSections = [];
    }
  }

  function activeOptionsStripHtml(items) {
    if (!Array.isArray(items) || items.length === 0) {
      return '<span class="dimtext">No active options available right now.</span>';
    }
    const num = (v) => {
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    };
    const parsePct = (v) => {
      if (v == null) return null;
      const m = String(v).match(/-?\d+(?:\.\d+)?/);
      return m ? Number(m[0]) : null;
    };
    const rowsData = items
      .map((it) => {
        const symbol = String(it?.ticker || it?.symbol || '').toUpperCase();
        if (!symbol) return null;
        return {
          symbol,
          type: String(it?.type || it?.optionType || '').toUpperCase(),
          expirationDate: String(it?.expirationDate || it?.expiration || ''),
          strike: num(it?.strike),
          optionVolume: num(it?.optionVolume ?? it?.optVolume ?? it?.option_volume),
          openInterest: num(it?.openInterest ?? it?.open_interest ?? it?.oi),
          optionContract: String(it?.optionContract || it?.contract || ''),
          price: num(it?.price),
          change: num(it?.changeAmount ?? it?.change_amount),
          changePct: parsePct(it?.changePercentage ?? it?.change_percentage),
          volume: num(it?.volume)
        };
      })
      .filter(Boolean);

    if (rowsData.length === 0) {
      return '<span class="dimtext">No active options available right now.</span>';
    }

    const rowVal = (row, key) => {
      if (key === 'symbol') return String(row?.symbol || '');
      if (key === 'type') return String(row?.type || '');
      if (key === 'expirationDate') return String(row?.expirationDate || '');
      if (key === 'strike') return num(row?.strike);
      if (key === 'optionVolume') return num(row?.optionVolume);
      if (key === 'openInterest') return num(row?.openInterest);
      if (key === 'price') return num(row?.price);
      if (key === 'volume') return num(row?.volume);
      return null;
    };
    const sorted = rowsData.slice().sort((a, b) => {
      const av = rowVal(a, _activeOptionsSortKey);
      const bv = rowVal(b, _activeOptionsSortKey);
      // Keep missing values at the bottom regardless of sort direction.
      if (av == null && bv == null) {
        const tie = String(a?.symbol || '').localeCompare(String(b?.symbol || ''));
        return tie;
      }
      if (av == null) return 1;
      if (bv == null) return -1;

      let cmp = 0;
      if (typeof av === 'string' || typeof bv === 'string') {
        cmp = String(av || '').localeCompare(String(bv || ''));
      } else {
        cmp = av - bv;
      }
      if (cmp === 0) cmp = String(a?.symbol || '').localeCompare(String(b?.symbol || ''));
      return _activeOptionsSortDir === 'asc' ? cmp : -cmp;
    });

    const sortArrow = (key) => {
      if (_activeOptionsSortKey !== key) return '';
      return _activeOptionsSortDir === 'asc' ? ' ▲' : ' ▼';
    };
    const sortBtn = (key, label) => {
      const active = _activeOptionsSortKey === key ? ' active' : '';
      return `<button type="button" class="active-sort-btn${active}" data-aosort="${key}">${label}${sortArrow(key)}</button>`;
    };
    const header = '<div class="active-options-grid-header">'
      + `<span>${sortBtn('symbol', 'Ticker')}</span>`
      + `<span>${sortBtn('type', 'Type')}</span>`
      + `<span>${sortBtn('expirationDate', 'Expiry')}</span>`
      + `<span>${sortBtn('strike', 'Strike')}</span>`
      + `<span>${sortBtn('optionVolume', 'Opt Vol')}</span>`
      + `<span>${sortBtn('openInterest', 'OI')}</span>`
      + `<span>${sortBtn('volume', 'Stock Vol')}</span>`
      + '</div>';

    const rows = sorted.map((it) => {
      const symbol = it.symbol || 'N/A';
      const type = String(it.type || '').toUpperCase();
      const exp = String(it.expirationDate || '');
      const strike = num(it.strike);
      const optVol = num(it.optionVolume);
      const oi = num(it.openInterest);
      const vol = num(it.volume);
      const typeColor = type === 'CALL' ? '#4ade80' : (type === 'PUT' ? '#f87171' : '#94a3b8');
      return '<div class="active-options-grid-row" data-active-option-symbol="'+escapeHtml(symbol)+'" title="'+escapeHtml(String(it.optionContract || it.contract || ''))+'">'
        + '<span style="font-weight:800;color:#dbeafe">'+escapeHtml(symbol)+'</span>'
        + '<span style="font-weight:700;color:'+typeColor+'">'+escapeHtml(type || '\u2014')+'</span>'
        + '<span>'+escapeHtml(exp || '\u2014')+'</span>'
        + '<span>'+(strike == null ? '\u2014' : strike.toFixed(2))+'</span>'
        + '<span>'+(optVol == null ? '\u2014' : Math.round(optVol).toLocaleString())+'</span>'
        + '<span>'+(oi == null ? '\u2014' : Math.round(oi).toLocaleString())+'</span>'
        + '<span>'+(vol == null ? '\u2014' : Math.round(vol).toLocaleString())+'</span>'
        + '</div>';
    }).join('');

    const visibleRows = 10;
    const rowHeightPx = 34;
    const rowsContainerStyle = sorted.length > visibleRows
      ? ` style="max-height:${visibleRows * rowHeightPx}px"`
      : '';

    return `<div class="active-options-grid">${header}<div class="active-options-grid-rows"${rowsContainerStyle}>${rows}</div></div>`;
  }

  async function loadActiveOptions() {
    const initial = window.INITIAL_ACTIVE_OPTIONS_DATA;
    if (initial && Array.isArray(initial.items) && initial.items.length > 0) {
      _activeOptionsItems = initial.items;
      if (_insightsStripMode === 'activeOptions') renderInsightsStripContent();
    }
    try {

      const data = await res.json();

  // Options horizon state
  let _optionsHorizonBucket = '0-3';
  let _optionsHorizonCache = {};
  let _tickerOptionsBasePayload = null;
  let _tickerOptionsSortKey = 'volume';
  let _tickerOptionsSortDir = 'desc';

  function sortTickerOptionsRows(rows) {
    const num = (v) => {
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    };
    const rowVal = (row, key) => {
      if (key === 'type') return String(row?.type || '');
      if (key === 'expirationDate') return String(row?.expirationDate || '');
      if (key === 'strike') return num(row?.strike);
      if (key === 'lastPrice') return num(row?.lastPrice);
      if (key === 'volume') return num(row?.volume);
      if (key === 'openInterest') return num(row?.openInterest);
      return null;
    };
    return rows.slice().sort((a, b) => {
      const av = rowVal(a, _tickerOptionsSortKey);
      const bv = rowVal(b, _tickerOptionsSortKey);
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      let cmp = 0;
      if (typeof av === 'string' || typeof bv === 'string') {
        cmp = String(av || '').localeCompare(String(bv || ''));
      } else {
        cmp = av - bv;
      }
      return _tickerOptionsSortDir === 'asc' ? cmp : -cmp;
    });
  }

  function tickerOptionsHtml(payload) {
    const calls = Array.isArray(payload?.calls) ? payload.calls : [];
    const puts = Array.isArray(payload?.puts) ? payload.puts : [];
    function rowHtml(r) {
      const strike = Number.isFinite(+r.strike) ? (+r.strike).toFixed(2) : '\u2014';
      const last = Number.isFinite(+r.lastPrice) ? (+r.lastPrice).toFixed(2) : '\u2014';
      const vol = Number.isFinite(+r.volume) ? Math.round(+r.volume).toLocaleString() : '\u2014';
      const oi = Number.isFinite(+r.openInterest) ? Math.round(+r.openInterest).toLocaleString() : '\u2014';
      const typeCls = r.type === 'CALL' ? 'color:#4ade80;font-weight:700' : 'color:#f87171;font-weight:700';
      return '<tr style="border-bottom:1px solid #1e293b"><td style="padding:4px 6px;'+typeCls+'">'+escapeHtml(r.type||'')+'</td><td style="padding:4px 6px">'+strike+'</td><td style="padding:4px 6px">'+last+'</td><td style="padding:4px 6px">'+vol+'</td><td style="padding:4px 6px">'+oi+'</td></tr>';
    }
    const horizonTabs = [
      { key: '0-3', label: 'Next 0-3' },
      { key: '3-6', label: 'Next 3-6' },
      { key: '9-12', label: 'Next 9-12' },
      { key: '12+', label: '12 and above' }
    ].map(w =>
      '<button class="earnings-day-tab'+(w.key===_optionsHorizonBucket?' active':'')+' options-horizon-tab" data-bucket="'+w.key+'">'+w.label+'</button>'
    ).join('');
    const nearestSorted = sortTickerOptionsRows([...calls, ...puts]);
    const nearestRows = nearestSorted.slice(0, 20).map(rowHtml).join('');
    return '<div style="margin-bottom:6px;font-size:0.78rem;color:#64748b">Nearest expiry: <strong>'+escapeHtml(payload.expirationDate || '\u2014')+'</strong></div>'
      + '<div style="margin-bottom:8px;font-size:0.75rem;color:#475569">Select a time window to see top active options by volume:</div>'
      + '<div id="optionsHorizonTabs" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">'+horizonTabs+'</div>'
      + '<div id="optionsHorizonTableArea" style="overflow-x:auto">'
      + (nearestRows
          ? '<table style="width:100%;border-collapse:collapse;font-size:0.8rem">'
            + '<thead><tr style="color:#64748b;font-size:0.7rem;text-transform:uppercase;border-bottom:1px solid #334155">'

  function tickerOptionsHorizonHtml(contracts, bucketLabel) {
    if (!Array.isArray(contracts) || contracts.length === 0) {
      return '<p class="dimtext">No active contracts found in '+bucketLabel+'.</p>';
    }
    const sortedContracts = sortTickerOptionsRows(contracts);
    const rows = sortedContracts.map(r => {
      const strike = Number.isFinite(+r.strike) ? (+r.strike).toFixed(2) : '\u2014';
      const last = Number.isFinite(+r.lastPrice) ? (+r.lastPrice).toFixed(2) : '\u2014';
      const vol = Number.isFinite(+r.volume) ? Math.round(+r.volume).toLocaleString() : '\u2014';
      const oi = Number.isFinite(+r.openInterest) ? Math.round(+r.openInterest).toLocaleString() : '\u2014';
      const exp = escapeHtml(r.expirationDate || '\u2014');
      const typeCls = r.type === 'CALL' ? 'color:#4ade80;font-weight:700' : 'color:#f87171;font-weight:700';
      return '<tr style="border-bottom:1px solid #1e293b">'
        + '<td style="padding:4px 6px;'+typeCls+'">'+escapeHtml(r.type||'')+'</td>'
        + '<td style="padding:4px 6px">'+exp+'</td>'
        + '<td style="padding:4px 6px">'+strike+'</td>'
        + '<td style="padding:4px 6px">'+last+'</td>'
        + '<td style="padding:4px 6px">'+vol+'</td>'
        + '<td style="padding:4px 6px">'+oi+'</td>'
        + '</tr>';
    }).join('');
    return '<table style="width:100%;border-collapse:collapse;font-size:0.8rem">'
      + '<thead><tr style="color:#64748b;font-size:0.7rem;text-transform:uppercase;border-bottom:1px solid #334155">'
      + '<th style="text-align:left;padding:4px 6px">'+tickerOptionsSortBtn('type', 'Type')+'</th><th style="text-align:left;padding:4px 6px">'+tickerOptionsSortBtn('expirationDate', 'Expiry')+'</th>'
      + '<th style="text-align:left;padding:4px 6px">'+tickerOptionsSortBtn('strike', 'Strike')+'</th><th style="text-align:left;padding:4px 6px">'+tickerOptionsSortBtn('lastPrice', 'Last')+'</th>'
      + '<th style="text-align:left;padding:4px 6px">'+tickerOptionsSortBtn('volume', 'Volume')+'</th><th style="text-align:left;padding:4px 6px">'+tickerOptionsSortBtn('openInterest', 'OI')+'</th>'
      + '</tr></thead><tbody>'+rows+'</tbody></table>';
  }

  function recommendationPanelHtml(report) {
    if (!report || report.error) {
      return '<p class="dimtext">Recommendation data is unavailable for this symbol.</p>';
    }

    const triad = report.triadVerdict || {};
    const overallVerdict = report.overallVerdict || '';
    const verdictReason = report.verdictReason || '';
    const card = report.engineScorecard || {};
    const ladder = report.gammaLadder || {};
    const flow = report.flowTells || {};
    const iv = report.ivContext || {};
    const recs = Array.isArray(report.topTrades) && report.topTrades.length
      ? report.topTrades
      : (Array.isArray(report.recommendations) ? report.recommendations : []);
    const currentMode = ['conservative', 'balanced', 'aggressive'].includes(String(_recommendationRiskMode || '').toLowerCase())
      ? String(_recommendationRiskMode).toLowerCase()
      : (['conservative', 'balanced', 'aggressive'].includes(String(report?.riskMode || '').toLowerCase())
        ? String(report.riskMode).toLowerCase()
        : 'balanced');
    const currentTrack = ['trading', 'investor'].includes(String(_recommendationTrack || '').toLowerCase())
      ? String(_recommendationTrack).toLowerCase()
      : (String(report?.track || '').toUpperCase() === 'INVESTOR' ? 'investor' : 'trading');
    const currentHorizon = ['short', 'medium', 'long', 'all'].includes(String(_recommendationHorizon || '').toLowerCase())
      ? String(_recommendationHorizon).toLowerCase()
      : (['short', 'medium', 'long', 'all'].includes(String(report?.horizon || '').toLowerCase())
        ? String(report.horizon).toLowerCase()
        : 'all');

    const modePill = currentMode === 'conservative'
      ? 'Conservative'
      : currentMode === 'aggressive'
        ? 'Aggressive'
        : 'Balanced';

    const controlsHtml = '<div style="position:sticky;top:8px;z-index:12;margin:0 0 14px 0;padding:6px 0 8px;background:linear-gradient(to bottom, rgba(2,6,23,0.95), rgba(2,6,23,0.78) 70%, rgba(2,6,23,0));backdrop-filter: blur(2px)">'
      + '<div class="panel-label" style="margin-bottom:8px">Recommendation Controls</div>'
      + '<div style="display:flex;align-items:center;justify-content:flex-start;gap:12px;flex-wrap:wrap;padding:8px 10px;border:1px solid #1e293b;border-radius:12px;background:#0b1220">'
      + '<div id="recommendationTrackModes" style="display:inline-flex;gap:6px">'
      + '<button class="track-mode-btn" data-track="trading" style="border:1px solid '+(currentTrack === 'trading' ? '#0ea5e9' : '#334155')+';background:'+(currentTrack === 'trading' ? '#0b3a4a' : '#0b1220')+';color:'+(currentTrack === 'trading' ? '#e0f2fe' : '#cbd5e1')+';border-radius:999px;padding:5px 12px;font-size:0.74rem;cursor:pointer">Trader</button>'
      + '<button class="track-mode-btn" data-track="investor" style="border:1px solid '+(currentTrack === 'investor' ? '#0ea5e9' : '#334155')+';background:'+(currentTrack === 'investor' ? '#0b3a4a' : '#0b1220')+';color:'+(currentTrack === 'investor' ? '#e0f2fe' : '#cbd5e1')+';border-radius:999px;padding:5px 12px;font-size:0.74rem;cursor:pointer">Investor</button>'
      + '</div>'
      + (currentTrack === 'trading'
        ? ('<span class="dimtext" style="font-size:0.72rem">Mode: <strong style="color:#dbeafe">'+modePill+'</strong></span>'
          + '<div id="recommendationRiskModes" style="display:inline-flex;gap:6px">'
          + '<button class="risk-mode-btn" data-mode="conservative" style="border:1px solid '+(currentMode === 'conservative' ? '#0ea5e9' : '#334155')+';background:'+(currentMode === 'conservative' ? '#0b3a4a' : '#0b1220')+';color:'+(currentMode === 'conservative' ? '#e0f2fe' : '#cbd5e1')+';border-radius:999px;padding:5px 12px;font-size:0.74rem;cursor:pointer">Conservative</button>'
          + '<button class="risk-mode-btn" data-mode="balanced" style="border:1px solid '+(currentMode === 'balanced' ? '#0ea5e9' : '#334155')+';background:'+(currentMode === 'balanced' ? '#0b3a4a' : '#0b1220')+';color:'+(currentMode === 'balanced' ? '#e0f2fe' : '#cbd5e1')+';border-radius:999px;padding:5px 12px;font-size:0.74rem;cursor:pointer">Balanced</button>'
          + '<button class="risk-mode-btn" data-mode="aggressive" style="border:1px solid '+(currentMode === 'aggressive' ? '#0ea5e9' : '#334155')+';background:'+(currentMode === 'aggressive' ? '#0b3a4a' : '#0b1220')+';color:'+(currentMode === 'aggressive' ? '#e0f2fe' : '#cbd5e1')+';border-radius:999px;padding:5px 12px;font-size:0.74rem;cursor:pointer">Aggressive</button>'
          + '</div>')
        : ('<div id="recommendationHorizonModes" style="display:inline-flex;gap:6px">'
          + '<button class="horizon-mode-btn" data-horizon="short" style="border:1px solid '+(currentHorizon === 'short' ? '#0ea5e9' : '#334155')+';background:'+(currentHorizon === 'short' ? '#0b3a4a' : '#0b1220')+';color:'+(currentHorizon === 'short' ? '#e0f2fe' : '#cbd5e1')+';border-radius:999px;padding:5px 12px;font-size:0.74rem;cursor:pointer">Short</button>'
          + '<button class="horizon-mode-btn" data-horizon="medium" style="border:1px solid '+(currentHorizon === 'medium' ? '#0ea5e9' : '#334155')+';background:'+(currentHorizon === 'medium' ? '#0b3a4a' : '#0b1220')+';color:'+(currentHorizon === 'medium' ? '#e0f2fe' : '#cbd5e1')+';border-radius:999px;padding:5px 12px;font-size:0.74rem;cursor:pointer">Medium</button>'
          + '<button class="horizon-mode-btn" data-horizon="long" style="border:1px solid '+(currentHorizon === 'long' ? '#0ea5e9' : '#334155')+';background:'+(currentHorizon === 'long' ? '#0b3a4a' : '#0b1220')+';color:'+(currentHorizon === 'long' ? '#e0f2fe' : '#cbd5e1')+';border-radius:999px;padding:5px 12px;font-size:0.74rem;cursor:pointer">Long</button>'
          + '<button class="horizon-mode-btn" data-horizon="all" style="border:1px solid '+(currentHorizon === 'all' ? '#0ea5e9' : '#334155')+';background:'+(currentHorizon === 'all' ? '#0b3a4a' : '#0b1220')+';color:'+(currentHorizon === 'all' ? '#e0f2fe' : '#cbd5e1')+';border-radius:999px;padding:5px 12px;font-size:0.74rem;cursor:pointer">All</button>'
          + '</div>'))
      + '</div>'
      + '</div>'
      + '</div>';

    if (currentTrack === 'investor' || String(report?.track || '').toUpperCase() === 'INVESTOR') {
      const metrics = report.metrics || {};
      const timeline = report.timeline || {};
      const strategicDipValue = Number.isFinite(+metrics.strategicDipTarget) ? (+metrics.strategicDipTarget).toFixed(2) : null;
      const strategicDipZone = strategicDipValue ? ('$' + strategicDipValue) : null;
      const over = String(report.overallVerdict || '').toUpperCase();
      const investorCls = over.includes('BUY')

      return controlsHtml
        + '<div class="panel-label" style="margin-bottom:6px">Macro Verdict</div>'
        + '<div class="grid">'
        + m(tl('Overall', 'Investor recommendation from horizon-specific valuation, technical, and structural logic.'), '<span style="'+investorCls+'">'+escapeHtml(report.overallVerdict || 'HOLD')+'</span>')

        + '<div class="metric reason-metric">'
        + '<div class="m-label">'+tl('Reason', 'Natural-language investor guidance for current price context and horizon.')+'</div>'
        + '<div class="m-value">'+formatRecommendationReason(report.reason || 'No investor reason available.', report.overallVerdict || 'HOLD')+'</div>'
        + '</div>'
        + '<div class="panel-label" style="margin-top:10px">Investor Scorecard</div>'
        + '<div class="grid">'
        + m('Spot Price', Number.isFinite(+metrics.spotPrice) ? '$'+(+metrics.spotPrice).toFixed(2) : 'N/A')
        + m('Street Target', Number.isFinite(+metrics.targetPrice) ? '$'+(+metrics.targetPrice).toFixed(2) : 'N/A')
        + m('Strategic Dip', strategicDipZone || 'N/A')
        + m('P/E Ratio', Number.isFinite(+metrics.peRatio) ? (+metrics.peRatio).toFixed(2) : 'N/A')
        + m('YoY Growth', Number.isFinite(+metrics.yoyRevenueGrowthPct) ? (+metrics.yoyRevenueGrowthPct).toFixed(1) + '%' : 'N/A')
        + m('RSI (14)', Number.isFinite(+metrics.rsi14) ? (+metrics.rsi14).toFixed(1) : 'N/A')
        + '</div>'
        + '<div class="panel-label" style="margin-top:10px">Timeline Action Engine</div>'
        + '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:0.8rem">'
        + '<thead><tr style="color:#64748b;font-size:0.7rem;text-transform:uppercase;border-bottom:1px solid #334155">'
        + '<th style="text-align:left;padding:4px 6px">Timeframe</th><th style="text-align:left;padding:4px 6px">Verdict</th><th style="text-align:left;padding:4px 6px">Allocation</th><th style="text-align:left;padding:4px 6px">Target Zone</th>'
        + '</tr></thead><tbody>'
        + ['short','medium','long'].map((k) => {
          const row = timeline[k] || {};
          const syncedTargetZone = (k === 'long' && strategicDipZone)
            ? strategicDipZone
            : String(row.targetZone || '—');
          return '<tr style="border-bottom:1px solid #1e293b">'
            + '<td style="padding:4px 6px">'+escapeHtml(k.charAt(0).toUpperCase() + k.slice(1))+'</td>'
            + '<td style="padding:4px 6px">'+escapeHtml(String(row.verdict || 'HOLD'))+'</td>'
            + '<td style="padding:4px 6px">'+escapeHtml(String(row.allocation || '—'))+'</td>'
            + '<td style="padding:4px 6px">'+escapeHtml(syncedTargetZone)+'</td>'
            + '</tr>';
        }).join('')
        + '</tbody></table></div>'
        + '<div class="panel-label" style="margin-top:10px">Portfolio Guidance</div>'
        + '<div class="grid">'
        + m('Current Holders', escapeHtml(String((report.portfolioGuidance || {}).currentHolders || 'Maintain core allocation')))
        + m('Side-Line Capital', escapeHtml(strategicDipZone ? ('Wait for pullback near ' + strategicDipZone) : String((report.portfolioGuidance || {}).sideLineCapital || 'Use staged entries near support levels')))
        + '</div>';
    }

    const verdictCls = triad.verdict === 'Bullish'
      ? 'color:#16a34a;font-weight:700'
      : triad.verdict === 'Bearish'
        ? 'color:#dc2626;font-weight:700'
        : 'color:#f59e0b;font-weight:700';

    const macroVerdictCls = String(overallVerdict).startsWith('BULLISH')
      ? 'color:#16a34a;font-weight:700'
      : String(overallVerdict).startsWith('BEARISH')
        ? 'color:#dc2626;font-weight:700'
        : 'color:#f59e0b;font-weight:700';

    const recRows = recs.length
      ? recs.map((r, i) => {
          const rType = String(r.type || '').toLowerCase();
          const typeCls = rType === 'call'
            ? 'color:#4ade80;font-weight:700'
            : rType === 'put'
              ? 'color:#f87171;font-weight:700'
              : 'color:#f59e0b;font-weight:700';
          const priceFmt = String(r.priceLabel || '').trim()
            ? escapeHtml(String(r.priceLabel))
            : (Number.isFinite(+r.currentPrice) ? '$' + (+r.currentPrice).toFixed(2) : '--');
          const expiryLabel = (() => {
            const exp = r.expiration || '--';
            const d = new Date(exp);
            if (!exp || exp === '--' || Number.isNaN(d.getTime())) return escapeHtml(exp);
            const month = d.toLocaleString('en-US', { month: 'long' });
            return escapeHtml(exp + ' (' + month + ')');
          })();
          const strikeLabel = Number.isFinite(+r.strike)
            ? fv(r.strike)
            : escapeHtml(String(r.strike || '--'));
          const typeLabel = rType === 'iron-condor'
            ? escapeHtml(String(r.strategy || 'IRON CONDOR'))
            : escapeHtml(String(r.type || '').toUpperCase());
          return '<tr style="border-bottom:1px solid #1e293b">'
            + '<td style="padding:4px 6px">'+(i + 1)+'</td>'
            + '<td style="padding:4px 6px;'+typeCls+'">'+typeLabel+'</td>'
            + '<td style="padding:4px 6px">'+strikeLabel+'</td>'
            + '<td style="padding:4px 6px">'+expiryLabel+'</td>'
            + '<td style="padding:4px 6px;color:#facc15;font-weight:600">'+priceFmt+'</td>'
            + '<td style="padding:4px 6px">'+(Number.isFinite(+r.volume) ? Math.round(+r.volume).toLocaleString() : '--')+'</td>'
            + '<td style="padding:4px 6px">'+(Number.isFinite(+r.openInterest) ? Math.round(+r.openInterest).toLocaleString() : '--')+'</td>'
            + '<td style="padding:4px 6px">'+(Number.isFinite(+r.chanceOfProfit) ? Math.round(+r.chanceOfProfit) + '%' : '--')+'</td>'
            + '<td style="padding:4px 6px">'+(Number.isFinite(+r.score) ? (+r.score).toFixed(1) : '--')+'</td>'
            + '</tr>';
        }).join('')
          : '<tr><td colspan="9" class="dimtext" style="padding:8px">No contracts match the current thesis filters.</td></tr>';

    const unusual = Array.isArray(flow.unusualContracts) ? flow.unusualContracts : [];
    const unusualHtml = unusual.length
      ? '<div style="display:flex;flex-wrap:wrap;gap:6px">'
        + unusual.map((u) => {
          const side = String(u.type || '').toLowerCase() === 'call' ? 'CALL' : 'PUT';
          const cls = side === 'CALL' ? 'color:#4ade80' : 'color:#f87171';
          return '<span class="meta-chip" style="font-size:0.72rem">'

      : '<p class="dimtext">No unusual volume/oi contracts detected.</p>';

    const tradeCtx = report.tradeCardContext || null;
    const tradeCtxHtml = tradeCtx
      ? ('<div class="panel-label" style="margin-top:10px">Execution Profile</div>'
        + '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:0.8rem">'
        + '<thead><tr style="color:#64748b;font-size:0.7rem;text-transform:uppercase;border-bottom:1px solid #334155">'
        + '<th style="text-align:left;padding:4px 6px">Live Spot</th>'
        + '<th style="text-align:left;padding:4px 6px">Strike</th>'
        + '<th style="text-align:left;padding:4px 6px">Premium</th>'
        + '<th style="text-align:left;padding:4px 6px">Net Cost If Assigned</th>'
        + '</tr></thead><tbody><tr style="border-bottom:1px solid #1e293b">'
        + '<td style="padding:4px 6px">'+(Number.isFinite(+tradeCtx.executionProfile?.spotPrice) ? '$'+(+tradeCtx.executionProfile.spotPrice).toFixed(2) : 'N/A')+'</td>'
        + '<td style="padding:4px 6px">'+(Number.isFinite(+tradeCtx.executionProfile?.strikePrice) ? '$'+(+tradeCtx.executionProfile.strikePrice).toFixed(2) : 'N/A')+'</td>'
        + '<td style="padding:4px 6px;color:#22c55e;font-weight:700">'+(Number.isFinite(+tradeCtx.executionProfile?.premiumCollected) ? '$'+(+tradeCtx.executionProfile.premiumCollected).toFixed(2) : 'N/A')+'</td>'
        + '<td style="padding:4px 6px;color:#facc15;font-weight:700">'+(Number.isFinite(+tradeCtx.executionProfile?.netCostIfAssignedContract) ? '$'+Math.round(+tradeCtx.executionProfile.netCostIfAssignedContract).toLocaleString() : (Number.isFinite(+tradeCtx.executionProfile?.netCostIfAssigned) ? '$'+Math.round((+tradeCtx.executionProfile.netCostIfAssigned) * 100).toLocaleString() : 'N/A'))+'</td>'
        + '</tr></tbody></table></div>'
        + '<div class="panel-label" style="margin-top:10px">Why This Trade</div>'
        + '<div style="display:grid;gap:8px">'
        + '<div style="border:1px solid #1e293b;border-radius:10px;padding:10px;background:#0b1220">'
        + '<div style="font-weight:700;color:#86efac;margin-bottom:4px">'+escapeHtml(String(tradeCtx.point1?.heading || 'Structural Context'))+'</div>'
        + '<div class="dimtext" style="font-size:0.82rem">'+escapeHtml(String(tradeCtx.point1?.body || ''))+'</div>'
        + '</div>'
        + '<div style="border:1px solid #1e293b;border-radius:10px;padding:10px;background:#0b1220">'
        + '<div style="font-weight:700;color:#67e8f9;margin-bottom:4px">'+escapeHtml(String(tradeCtx.point4?.heading || 'Timeline Context'))+'</div>'
        + '<div class="dimtext" style="font-size:0.82rem">'+escapeHtml(String(tradeCtx.point4?.body || ''))+'</div>'
        + '</div>'
        + '</div>')
      : '';

    return controlsHtml
      + '<div class="panel-label" style="margin-bottom:6px">Macro Verdict</div>'
      + '<div class="grid">'
      + m(tl('Overall', 'Primary strategy decision produced by the engine after combining regime, flow, and IV context.'), '<span style="'+macroVerdictCls+'">'+escapeHtml(overallVerdict || 'NEUTRAL (PREMIUM SELLING)')+'</span>')

      + '<div class="metric reason-metric">'
      + '<div class="m-label">'+tl('Reason', 'Natural-language explanation of why this macro strategy was selected for current market structure.')+'</div>'
      + '<div class="m-value">'+formatRecommendationReason(verdictReason, overallVerdict)+'</div>'
      + '</div>'
      + '<div class="panel-label" style="margin-top:10px">Triad Verdict</div>'
      + '<div class="grid">'
      + m(tl('Verdict', 'Directional read from the triad model (Bullish / Bearish / Neutral).'), '<span style="'+verdictCls+'">'+escapeHtml(triad.verdict || 'Neutral')+'</span>')
      + m(tl('Confidence', 'Triad confidence score from 0 to 100 based on alignment of core signals.'), Number.isFinite(+triad.confidence) ? (+triad.confidence).toFixed(0) + '/100' : 'N/A')
      + m(tl('Spot', 'Current underlying spot price used for all model calculations.'), fv(report.spotPrice))
      + m(tl('IV Rank', 'Implied volatility percentile versus recent historical range. High values indicate expensive options.'), Number.isFinite(+iv.ivRank) ? (+iv.ivRank).toFixed(1) + '%' : 'N/A')

      + '<div class="panel-label" style="margin-top:10px">Engine Scorecard</div>'
      + '<div class="grid">'
      + m(tl('Regime', 'Composite regime score blending velocity, reversion, volatility context, and liquidity.'), Number.isFinite(+card.regime) ? (+card.regime).toFixed(0) : 'N/A')

      + m(tl('Reversion', 'Mean-reversion tendency score. Higher values imply pullback/centering behavior.'), Number.isFinite(+card.reversion) ? (+card.reversion).toFixed(0) : 'N/A')
      + m(tl('Volatility', 'Volatility suitability score based on IV context.'), Number.isFinite(+card.volatility) ? (+card.volatility).toFixed(0) : 'N/A')

      + m(tl('Put Wall', 'Strike with highest put open interest; often acts as downside support zone.'), fv(ladder.putWall))
