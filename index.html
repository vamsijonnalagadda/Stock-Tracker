<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Talk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0c0f18;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 18px 12px 60px;
    }

    .page { width: 100%; max-width: none; margin: 0; }

    /* ── Market Ticker Bar ── */
    .market-ticker-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      background: #0b1018;
      border: 1px solid #1e293b;
      border-radius: 14px;
      padding: 10px 18px;
      margin-bottom: 14px;
      align-items: center;
    }
    .mkt-item {
      display: inline-flex;
      align-items: baseline;
      gap: 5px;
      font-size: 0.82rem;
      white-space: nowrap;
    }
    .mkt-label { color: #64748b; font-weight: 600; letter-spacing: 0.02em; }
    .mkt-price { color: #e2e8f0; font-weight: 700; font-variant-numeric: tabular-nums; }
    .mkt-chg.up   { color: #34d399; }
    .mkt-chg.down { color: #f87171; }
    .mkt-chg.flat { color: #64748b; }
    .mkt-sep { color: #1e293b; font-size: 0.9rem; user-select: none; }
    .market-groups { display:flex; gap:12px; width:100%; flex-wrap:wrap; align-items:center; }
    .market-group { display:flex; gap:10px; align-items:center; background:rgba(255,255,255,0.02); padding:6px 10px; border-radius:10px; }
    .group-label { font-size:0.68rem; color:#94a3b8; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; margin-right:6px; }
    .group-items { display:flex; gap:8px; align-items:center; }

    /* ── Search bar ── */
    .search-wrap { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; }
    .search-wrap input {
      flex: 1 1 260px;
      padding: 13px 18px;
      border-radius: 14px;
      border: 1.5px solid #1e293b;
      background: #111827;
      color: #f1f5f9;
      font-size: 1rem;
      outline: none;
      transition: border-color .18s;
    }
    .search-wrap input:focus { border-color: #6366f1; }
    .search-wrap input::placeholder { color: #334155; }
    #fetchBtn {
      padding: 13px 28px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #6366f1 0%, #06b6d4 100%);
      color: #fff;
      font-weight: 700;
      font-size: 0.96rem;
      cursor: pointer;
      transition: opacity .18s, transform .12s;
      box-shadow: 0 6px 24px rgba(99,102,241,0.35);
    }
    #fetchBtn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    #fetchBtn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Price card ── */
    .price-card {
      background: linear-gradient(145deg, #111827 0%, #0f1629 100%);
      border: 1px solid #1e293b;
      border-radius: 22px;
      padding: 26px 28px 22px;
      margin-bottom: 16px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    }
    .company-name {
      font-size: 0.78rem; font-weight: 700; color: #475569;
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px;
    }
    .price-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .price-big { font-size: 56px; font-weight: 900; letter-spacing: -0.045em; line-height: 1; color: #f8fafc; }
    .pct-badge {
      font-size: 1rem; font-weight: 700;
      padding: 5px 15px; border-radius: 999px;
      display: inline-flex; align-items: center; gap: 3px;
    }
    .pct-positive { color: #34d399; background: rgba(52,211,153,0.12); border: 1px solid rgba(52,211,153,0.2); }
    .pct-negative { color: #f87171; background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.18); }
    .pct-neutral  { color: #64748b; background: rgba(100,116,139,0.1); border: 1px solid rgba(100,116,139,0.15); }
    .price-meta { font-size: 0.8rem; color: #334155; margin-top: 12px; line-height: 1.6; }

    /* ── Tab pill buttons ── */
    .tabs-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .tab-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border-radius: 999px;
      border: 1.5px solid #1e293b;
      background: #111827;
      color: #64748b;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all .2s ease;
      white-space: nowrap;
      user-select: none;
      letter-spacing: 0.01em;
    }
    .tab-icon { font-size: 0.95rem; }
    .tab-btn:hover {
      border-color: #4f46e5;
      color: #c7d2fe;
      background: #13163a;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79,70,229,0.18);
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 8px 28px rgba(79,70,229,0.38);
      transform: translateY(-2px);
    }

    /* ── Accordion panel (smooth expand/collapse) ── */
    .panel-wrap {
      display: grid;
      grid-template-rows: 0fr;
      opacity: 0;
      transition: grid-template-rows 0.3s cubic-bezier(0.4,0,0.2,1),
                  opacity 0.25s ease,
                  margin-bottom 0.3s ease;
      margin-bottom: 0;
    }
    .panel-wrap.open {
      grid-template-rows: 1fr;
      opacity: 1;
      margin-bottom: 10px;
    }
    .panel-inner-overflow { overflow: hidden; }
    .panel-inner {
      background: #111827;
      border: 1.5px solid #1e293b;
      border-radius: 18px;
      padding: 22px 22px 20px;
      margin-top: 4px;
    }
    .panel-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: #4f46e5;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 16px;
    }

    /* ── Metric grid ── */
    .grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    }
    .metric {
      background: #0d1117;
      border: 1px solid #1e293b;
      border-radius: 13px;
      padding: 13px 15px;
      transition: border-color .18s, transform .15s;
    }
    .metric:hover { border-color: #334155; transform: translateY(-1px); }
    .m-label { font-size: 0.7rem; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
    .m-value { font-size: 1rem; font-weight: 700; color: #f1f5f9; }

    /* ── JSON pre ── */
    pre {
      background: #080b11;
      border: 1px solid #1e293b;
      border-radius: 13px;
      padding: 16px;
      overflow: auto;
      font-size: 0.8rem;
      color: #64748b;
      line-height: 1.65;
    }

    .news-list { display: grid; gap: 10px; margin-bottom: 14px; }
    .news-item {
      display: block;
      padding: 12px 14px;
      border: 1px solid #1e293b;
      border-radius: 12px;
      background: #0b1018;
      text-decoration: none;
      transition: border-color .18s, transform .15s;
    }
    .news-item:hover { border-color: #334155; transform: translateY(-1px); }
    .news-title { color: #dbeafe; font-size: 0.9rem; font-weight: 600; line-height: 1.4; margin-bottom: 5px; }
    .news-meta { color: #64748b; font-size: 0.78rem; }

    .headline-bar {
      position: relative;
      overflow: hidden;
      border: 1px solid #1e293b;
      border-radius: 12px;
      background: #0b1018;
      margin-bottom: 12px;
      padding: 10px 0;
    }
    .headline-bar::before,
    .headline-bar::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 64px;
      z-index: 2;
      pointer-events: none;
    }
    .headline-bar::before {
      left: 0;
      background: linear-gradient(90deg, #0b1018 0%, rgba(11, 16, 24, 0) 100%);
    }
    .headline-bar::after {
      right: 0;
      background: linear-gradient(270deg, #0b1018 0%, rgba(11, 16, 24, 0) 100%);
    }
    .headline-track {
      display: inline-flex;
      gap: 28px;
      white-space: nowrap;
      padding-left: 100%;
      animation: headline-scroll 56s linear infinite;
      will-change: transform;
    }
    .headline-bar:hover .headline-track { animation-play-state: paused; }
    .headline-item {
      color: #cbd5e1;
      font-size: 0.83rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .headline-item:hover { color: #e2e8f0; }
    .headline-source {
      color: #38bdf8;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .headline-time { color: #64748b; }

    @keyframes headline-scroll {
      from { transform: translateX(0); }
      to { transform: translateX(-100%); }
    }

    .news-skeleton { display: grid; gap: 10px; }
    .news-skeleton-row {
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 12px 14px;
      background: #0b1018;
    }
    .skeleton-bar {
      height: 11px;
      border-radius: 8px;
      background: linear-gradient(90deg, #111827 25%, #1f2937 50%, #111827 75%);
      background-size: 200% 100%;
      animation: shimmer 1.1s linear infinite;
    }
    .skeleton-title { width: 92%; margin-bottom: 8px; }
    .skeleton-title.short { width: 66%; }
    .skeleton-meta { width: 42%; height: 9px; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .dimtext { color: #475569; font-size: 0.84rem; }
    .loading-msg { color: #475569; padding: 48px 0; text-align: center; font-size: 0.95rem; letter-spacing: 0.02em; }

    /* Responsive adjustments */
    @media (max-width: 900px) {
      body { padding: 14px 10px 50px; }
      .market-ticker-bar { padding: 8px 12px; }
      .market-group { padding: 6px 8px; }
      .mkt-item { font-size: 0.78rem; gap:6px }
      .headline-track { gap: 18px; }
      .price-big { font-size: 44px; }
    }

    @media (max-width: 520px) {
      .search-wrap input { flex-basis: 100%; }
      .market-groups { gap:8px; }
      .group-label { display:none; }
      .market-ticker-bar { padding: 6px 8px; }
      .mkt-item { font-size: 0.72rem; }
      .headline-track { gap: 12px; }
      .price-big { font-size: 36px; }
      .page { padding-left: 8px; padding-right: 8px; }
    }
  </style>
</head>
<body>
<div class="page">

  <div id="marketTickerBar" class="market-ticker-bar"></div>

  <div class="headline-bar"><div id="overallHeadlines"></div></div>

  <div class="search-wrap">
    <input id="ticker" placeholder="Search with ticker eg: NVDA,AAPL,TSLA" autocomplete="off" spellcheck="false" />
    <button id="fetchBtn">Search</button>
  </div>

  <div id="result"></div>

</div>
<script>
  const tickerInput = document.getElementById('ticker');
  const fetchBtn    = document.getElementById('fetchBtn');
  const resultEl    = document.getElementById('result');

  let inFlight = false, _poll = null, _prevClose = null, _cur = '';
  let _currentTicker = '', _currentCompanyName = '', _newsLoadedFor = '', _newsLoading = false;

  function setLoading(s) {
    inFlight = s;
    fetchBtn.disabled = s;
    fetchBtn.textContent = s ? 'Loading\u2026' : 'Search';
  }

  /* ── formatters ── */
  const fv  = v => (v == null || !Number.isFinite(+v)) ? 'N/A' : (+v).toFixed(2);
  const frt = v => v == null ? 'N/A' : ((+v)*100).toFixed(2)+'%';
  const fB  = v => { if(v==null) return 'N/A'; const n=+v; return Number.isFinite(n)?(n/1e9).toFixed(2)+'B':'N/A'; };
  const fM  = v => {
    if(v==null) return 'N/A'; const n=+v; if(!Number.isFinite(n)) return 'N/A';
    if(Math.abs(n)>=1e12) return (n/1e12).toFixed(2)+'T';
    if(Math.abs(n)>=1e9)  return (n/1e9).toFixed(2)+'B';
    if(Math.abs(n)>=1e6)  return (n/1e6).toFixed(2)+'M';
    return n.toLocaleString();
  };
  const clean = v => !v ? '' : String(v).replace(/\s*[-\u2014]?\s*Yahoo Finance\b/ig,'').replace(/\s+/g,' ').trim();
  const stripCompanySuffixes = v => clean(v)
    .replace(/\b(inc\.?|corp\.?|corporation|company|co\.?|limited|ltd\.?|plc|holdings?)\b/ig, '')
    .replace(/\s+/g, ' ')
    .trim();
  const fR    = (l,s) => !l ? 'N/A' : (s!=null ? l+' ('+s.toFixed(1)+')' : l);
  const m     = (lbl, val) => '<div class="metric"><div class="m-label">'+lbl+'</div><div class="m-value">'+val+'</div></div>';
  const newsHtml = (news) => {
    if (!Array.isArray(news) || news.length === 0) {
      return '<p class="dimtext">No recent news found.</p>';
    }
    return '<div class="news-list">' + news.slice(0, 5).map(item => {
      const title = item.title || 'Untitled';
      const source = item.source || 'Unknown source';
      const time = item.relativeTime || 'Unknown time';
      const url = item.url || '#';
      return '<a class="news-item" href="'+url+'" target="_blank" rel="noopener noreferrer">'
        + '<div class="news-title">'+title+'</div>'
        + '<div class="news-meta">'+source+' · '+time+'</div>'
        + '</a>';
    }).join('') + '</div>';
  };

  const newsSkeletonHtml = () => {
    return '<div class="news-skeleton">'
      + '<div class="news-skeleton-row"><div class="skeleton-bar skeleton-title"></div><div class="skeleton-bar skeleton-title short"></div><div class="skeleton-bar skeleton-meta"></div></div>'
      + '<div class="news-skeleton-row"><div class="skeleton-bar skeleton-title"></div><div class="skeleton-bar skeleton-meta"></div></div>'
      + '<div class="news-skeleton-row"><div class="skeleton-bar skeleton-title"></div><div class="skeleton-bar skeleton-title short"></div><div class="skeleton-bar skeleton-meta"></div></div>'
      + '</div>';
  };

  const overallTickerHtml = (news) => {
    if (!Array.isArray(news) || news.length === 0) {
      return '<p class="dimtext" style="padding:0 12px">No latest market headlines right now.</p>';
    }
    const itemHtml = news.slice(0, 10).map(item => {
      const title = item.title || 'Untitled';
      const source = item.source || 'Unknown';
      const time = item.relativeTime || '';
      const url = item.url || '#';
      return '<a class="headline-item" href="'+url+'" target="_blank" rel="noopener noreferrer">'
        + '<span class="headline-source">'+source+'</span>'
        + '<span>'+title+'</span>'
        + (time ? '<span class="headline-time">('+time+')</span>' : '')
        + '</a>';
    }).join('');

    // Duplicate content once for smooth looping.
    return '<div class="headline-track">'+itemHtml+itemHtml+'</div>';
  };

  /* ── Market Indices ── */
  function renderMarketTicker(indices) {
    const bar = document.getElementById('marketTickerBar');
    if (!bar || !Array.isArray(indices)) return;

    const groups = {
      US: ['S&P 500','Nasdaq','Dow'],
      Metals: ['Gold','Silver','10Y'],
      Energy: ['WTI','Brent'],
      Currency: ['USD/INR','Dollar Index'],
      India: ['Sensex'],
      Asia: ['Nikkei','KOSPI']
    };

    function itemHtml(idx) {
      const price = idx.price != null ? idx.price.toLocaleString('en-US', { maximumFractionDigits: 2, minimumFractionDigits: 2 }) : '—';
      const pct = idx.changePct != null ? idx.changePct : null;
      const dir = pct == null ? 'flat' : pct > 0 ? 'up' : pct < 0 ? 'down' : 'flat';
      const arrow = dir === 'up' ? '▲' : dir === 'down' ? '▼' : '●';
      const pctStr = pct != null ? (pct > 0 ? '+' : '') + pct.toFixed(2) + '%' : '';
      return '<span class="mkt-item">'
        + '<span class="mkt-label">' + idx.label + '</span>'
        + '<span class="mkt-price">' + price + '</span>'
        + (pctStr ? '<span class="mkt-chg ' + dir + '">' + arrow + ' ' + pctStr + '</span>' : '')
        + '</span>';
    }

    const byLabel = new Map(indices.filter(i => i && i.label != null).map(i => [String(i.label), i]));

    const html = Object.keys(groups).map((g) => {
      const labels = groups[g];
      const items = labels.map(l => byLabel.get(l)).filter(Boolean);
      if (items.length === 0) return '';
      return '<div class="market-group" role="group" aria-label="'+g+'">'
        + '<div class="group-label">' + g + '</div>'
        + '<div class="group-items">' + items.map(itemHtml).join('<span class="mkt-sep">|</span>') + '</div>'
        + '</div>';
    }).join('');

    bar.innerHTML = '<div class="market-groups">' + html + '</div>';
  }

  async function loadMarketIndices() {
    try {
      const res = await fetch('/api/market-indices');
      const data = await res.json();
      if (data.indices) renderMarketTicker(data.indices);
    } catch (_) {}
  }

  async function loadOverallHeadlines() {
    const container = document.getElementById('overallHeadlines');
    if (!container) return;
    container.innerHTML = '<p class="dimtext" style="padding:0 12px">Loading latest market headlines...</p>';
    try {
      const res = await fetch('/api/news/latest');
      const data = await res.json();
      if (data.error) {
        container.innerHTML = '<p class="dimtext" style="padding:0 12px">Unable to load latest headlines.</p>';
        return;
      }
      container.innerHTML = overallTickerHtml(data.news || []);
    } catch (_) {
      container.innerHTML = '<p class="dimtext" style="padding:0 12px">Unable to load latest headlines.</p>';
    }
  }

  async function loadNewsForCurrentTicker() {
    const container = document.getElementById('newsContainer');
    if (!container || !_currentTicker || _newsLoading || _newsLoadedFor === _currentTicker) return;

    _newsLoading = true;
    container.innerHTML = newsSkeletonHtml();

    try {
      const params = new URLSearchParams();
      if (_currentCompanyName) params.set('companyName', _currentCompanyName);
      const query = params.toString() ? ('?' + params.toString()) : '';
      const res = await fetch('/api/news/' + encodeURIComponent(_currentTicker) + query);
      const data = await res.json();
      if (data.error) {
        container.innerHTML = '<p class="dimtext">Unable to fetch news.</p>';
        return;
      }
      container.innerHTML = newsHtml(data.news);
      _newsLoadedFor = _currentTicker;
    } catch (_) {
      container.innerHTML = '<p class="dimtext">Unable to fetch news.</p>';
    } finally {
      _newsLoading = false;
    }
  }

  /* ── live price update ── */
  function updatePrice(price, currency, prevClose) {
    const pe = document.getElementById('priceValue');
    const be = document.getElementById('pctChange');
    if (!pe||!be) return;
    if (currency) _cur = currency;
    if (Number.isFinite(prevClose)) _prevClose = prevClose;
    pe.textContent = (_cur?_cur+' ':'')+fv(price);
    if (!_prevClose) { be.textContent='\u2014'; be.className='pct-badge pct-neutral'; return; }
    const pct = ((price-_prevClose)/_prevClose)*100;
    be.textContent = (pct>0?'\u25b2 ':pct<0?'\u25bc ':'')+Math.abs(pct).toFixed(2)+'%';
    be.className = 'pct-badge '+(pct>0?'pct-positive':pct<0?'pct-negative':'pct-neutral');
  }

  function startPolling(sym) {
    if (_poll) clearInterval(_poll);
    _poll = setInterval(() => {
      fetch('/api/ticker/'+encodeURIComponent(sym))
        .then(r=>r.json()).then(d=>{
          const p=+d.regularMarketPrice;
          if(Number.isFinite(p)) updatePrice(p,d.currency,+d.previousClose);
        }).catch(()=>{});
    }, 5000);
  }

  /* ── accordion wiring ── */
  function wireTabs() {
    const btns   = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.panel-wrap');
    btns.forEach(btn => btn.addEventListener('click', async () => {
      const id = btn.dataset.tab;
      const isActive = btn.classList.contains('active');
      /* close all */
      btns.forEach(b => b.classList.remove('active'));
      panels.forEach(p => p.classList.remove('open'));
      /* open clicked (toggle off if already open) */
      if (!isActive) {
        btn.classList.add('active');
        const panel = document.getElementById('panel-'+id);
        if (panel) {
          panel.classList.add('open');
          setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'nearest'}), 50);
        }
        if (id === 'news') {
          await loadNewsForCurrentTicker();
        }
      }
    }));
  }

  /* ── main search ── */
  async function doSearch() {
    const sym = tickerInput.value.trim().toUpperCase();
    if (!sym || inFlight) return;
    if (_poll) { clearInterval(_poll); _poll=null; }
    _currentTicker = sym;
    _currentCompanyName = '';
    _newsLoadedFor = '';
    _newsLoading = false;
    _prevClose=null; _cur='';
    setLoading(true);
    resultEl.innerHTML = '<div class="loading-msg">Fetching '+sym+'\u2026</div>';
    try {
      const res  = await fetch('/api/ticker/'+encodeURIComponent(sym));
      const data = await res.json();
      if (data.error) { resultEl.innerHTML='<p style="color:#f87171;padding:20px 0">'+data.error+'</p>'; return; }
      const tv = data.tradingView||{};
      const displayCompanyName = stripCompanySuffixes(data.shortName);
      _currentCompanyName = displayCompanyName;

      resultEl.innerHTML =
        /* Price card */
        '<div class="price-card">'+
          '<div class="company-name">'+sym+(displayCompanyName?' \u00b7 '+displayCompanyName:'')+' </div>'+
          '<div class="price-row">'+
            '<span id="priceValue" class="price-big">\u2014</span>'+
            '<span id="pctChange"  class="pct-badge pct-neutral">\u2014</span>'+
          '</div>'+
          '<div class="price-meta">Market Cap: '+fM(data.marketCap)+'&nbsp;&nbsp;\u00b7&nbsp;&nbsp;Prev Close: '+fv(data.previousClose)+'&nbsp;&nbsp;\u00b7&nbsp;&nbsp;Currency: '+(data.currency||'\u2014')+'</div>'+
        '</div>'+

        /* Tab buttons */
        '<div class="tabs-row">'+
          '<button class="tab-btn" data-tab="fundamentals"><span class="tab-icon">\ud83d\udcca</span> Fundamentals</button>'+
          '<button class="tab-btn" data-tab="technicals"><span class="tab-icon">\ud83d\udcc8</span> Technicals</button>'+
          '<button class="tab-btn" data-tab="consensus"><span class="tab-icon">\ud83c\udfaf</span> Consensus</button>'+
          '<button class="tab-btn" data-tab="recommendation"><span class="tab-icon">\ud83d\uddc2</span> Recommendation</button>'+
          '<button class="tab-btn" data-tab="news"><span class="tab-icon">\ud83d\udcf0</span> News</button>'+
          '<button class="tab-btn" data-tab="options"><span class="tab-icon">\u26a1</span> Options</button>'+
        '</div>'+

        /* Fundamentals panel */
        '<div id="panel-fundamentals" class="panel-wrap"><div class="panel-inner-overflow"><div class="panel-inner">'+
          '<div class="panel-label">Fundamentals</div><div class="grid">'+
            m('Forward P/E',fv(data.forwardPE))+m('PEG',fv(data.peg))+
            m('EV / EBITDA',fv(data.evEbitda))+m('Enterprise Value',fM(data.enterpriseValue))+
            m('EBITDA',fM(data.ebitda))+m('Total Revenue',fB(data.totalRevenue))+
            m('Free Cash Flow',fB(data.freeCashflow))+m('Op. Cash Flow',fB(data.operatingCashflow))+
            m('FCF Yield',frt(data.fcfYield))+m('FCF Margin',frt(data.fcfMargin))+
            m('OCF Margin',frt(data.ocfMargin))+m('Debt / Equity',fv(data.debtToEquity))+
            m('Market Cap',fM(data.marketCap))+
          '</div></div></div></div>'+

        /* Technicals panel */
        '<div id="panel-technicals" class="panel-wrap"><div class="panel-inner-overflow"><div class="panel-inner">'+
          '<div class="panel-label">Technicals</div><div class="grid">'+
            m('RSI',fv(tv.rsi))+m('MA 50',tv.ma50?fv(tv.ma50):'N/A')+m('MA 200',tv.ma200?fv(tv.ma200):'N/A')+
            m('52-W High',fv(data.fiftyTwoWeekHigh))+m('52-W Low',fv(data.fiftyTwoWeekLow))+m('Beta',fv(data.beta))+
          '</div>'+
          (tv.error?'<p class="dimtext" style="margin-top:12px">TradingView unavailable</p>':'')+
        '</div></div></div>'+

        /* Consensus panel */
        '<div id="panel-consensus" class="panel-wrap"><div class="panel-inner-overflow"><div class="panel-inner">'+
          '<div class="panel-label">Consensus</div><div class="grid">'+
            m('Rating',fR(tv.ratingLabel,tv.ratingScore))+
            m('Avg Price Target',fv(data.avgPriceTarget))+m('High Target',fv(data.highPriceTarget))+m('Low Target',fv(data.lowPriceTarget))+
          '</div></div></div></div>'+

        /* Recommendation panel */
        '<div id="panel-recommendation" class="panel-wrap"><div class="panel-inner-overflow"><div class="panel-inner">'+
          '<div class="panel-label">Recommendation Trend</div>'+
          '<pre>'+JSON.stringify(data.recommendationTrend||'Not available',null,2)+'</pre>'+
        '</div></div></div>'+

        /* News panel */
        '<div id="panel-news" class="panel-wrap"><div class="panel-inner-overflow"><div class="panel-inner">'+
          '<div class="panel-label">News</div>'+
          '<div id="newsContainer"><p class="dimtext">Click News to fetch latest headlines.</p></div>'+
        '</div></div></div>'+

        /* Options panel */
        '<div id="panel-options" class="panel-wrap"><div class="panel-inner-overflow"><div class="panel-inner">'+
          '<div class="panel-label">Options</div>'+
          '<pre>'+JSON.stringify(data.options||'Options data not available',null,2)+'</pre>'+
        '</div></div></div>';

      const ip = +data.regularMarketPrice;
      if (Number.isFinite(ip)) updatePrice(ip, data.currency, +data.previousClose);
      startPolling(sym);
      wireTabs();
    } catch(e) {
      resultEl.innerHTML='<p style="color:#f87171;padding:20px 0">'+e.message+'</p>';
    } finally { setLoading(false); }
  }

  fetchBtn.addEventListener('click', doSearch);
  tickerInput.addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch(); });
  loadMarketIndices();
  setInterval(loadMarketIndices, 60000);
  loadOverallHeadlines();
  setInterval(loadOverallHeadlines, 5 * 60 * 1000);
  // Auto-refresh ticker data every 5 minutes if a symbol is loaded
  setInterval(async () => {
    if (!_currentTicker || inFlight) return;
    const activeTabId = document.querySelector('.tab-btn.active')?.dataset?.tab || null;
    tickerInput.value = _currentTicker;
    _newsLoadedFor = '';
    await doSearch();
    if (activeTabId) {
      setTimeout(() => document.querySelector('.tab-btn[data-tab="'+activeTabId+'"]')?.click(), 200);
    }
  }, 5 * 60 * 1000);
</script>
</body>
</html>
