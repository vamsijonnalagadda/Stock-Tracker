  async function loadRecommendationForCurrentTicker() {
    const container = document.getElementById('recommendationContainer');
    if (!container || !_currentTicker) return;

    const track = ['trading', 'investor'].includes(String(_recommendationTrack || '').toLowerCase())
      ? String(_recommendationTrack).toLowerCase()
      : '';
    if (!track) {
      container.innerHTML = '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'
        + '<span class="dimtext">Choose recommendation mode:</span>'
        + '<button id="recChooseTrading" style="border:1px solid #334155;background:#0b1220;color:#cbd5e1;border-radius:999px;padding:5px 10px;font-size:0.75rem;cursor:pointer">Trader</button>'
        + '<button id="recChooseInvestor" style="border:1px solid #334155;background:#0b1220;color:#cbd5e1;border-radius:999px;padding:5px 10px;font-size:0.75rem;cursor:pointer">Investor</button>'
        + '</div>';
      const tBtn = document.getElementById('recChooseTrading');
      const iBtn = document.getElementById('recChooseInvestor');
      if (tBtn) tBtn.onclick = async () => { _recommendationTrack = 'trading'; _recommendationLoadedFor = ''; await loadRecommendationForCurrentTicker(); };
      if (iBtn) iBtn.onclick = async () => { _recommendationTrack = 'investor'; _recommendationLoadedFor = ''; await loadRecommendationForCurrentTicker(); };
      return;
    }

    const mode = ['conservative', 'balanced', 'aggressive'].includes(String(_recommendationRiskMode || '').toLowerCase())
      ? String(_recommendationRiskMode).toLowerCase()
      : 'balanced';
    const horizon = ['short', 'medium', 'long', 'all'].includes(String(_recommendationHorizon || '').toLowerCase())
      ? String(_recommendationHorizon).toLowerCase()
      : 'all';
    const recommendationKey = _currentTicker + ':' + mode + ':' + track + ':' + horizon;

    if (_recommendationLoadedFor === recommendationKey && _recommendationCache[recommendationKey]) {
      container.innerHTML = recommendationPanelHtml(_recommendationCache[recommendationKey]);
      wireRecommendationModeSelector();
      return;
    }

    container.innerHTML = '<p class="dimtext">Building recommendation scorecard…</p>';
    try {
      const res = await fetch('/api/options/' + encodeURIComponent(_currentTicker)
        + '/recommendation?riskMode=' + encodeURIComponent(mode)
        + '&track=' + encodeURIComponent(track)
        + '&horizon=' + encodeURIComponent(horizon));
      const data = await res.json();
      if (data.error) {
        container.innerHTML = '<p class="dimtext">'+escapeHtml(data.error)+'</p>';
        return;
      }
      _recommendationCache[recommendationKey] = data;
      _recommendationLoadedFor = recommendationKey;
      container.innerHTML = recommendationPanelHtml(data);
      wireRecommendationModeSelector();
    } catch (_) {
      container.innerHTML = '<p class="dimtext">Unable to load recommendation engine output.</p>';
    }

  const MARKET_GROUPS = {
    US:       ['S&P 500','Nasdaq'],
    Metals:   ['Gold','Silver'],
    Bonds:    ['2Y','10Y'],
    Energy:   ['WTI','Brent'],
    Crypto:   ['BTC','ETH'],
    Currency: ['USD/INR','Dollar Index'],
    Asia:     ['Nikkei','KOSPI','Sensex']
  };

  // ── Persistent module-level market state ──
  // Survives across loadMarketIndices calls so pills are never torn down mid-update.
  let _mktContentMap  = {};   // group -> inner HTML (rows)
  let _activeGroup    = 'US'; // currently open tab
  let _mktPillsWired  = false;

  /** Loading-skeleton rows for a group (shown before data arrives). */
  function _mktSkeletonRows(g) {
    return MARKET_GROUPS[g].map(l =>
      '<div class="market-row">' +
        '<div class="market-cell-label">' + l + '</div>' +
        '<div class="market-cell-price" style="color:#334155">—</div>' +
        '<div class="market-cell-chg mkt-chg flat"></div>' +
      '</div>'
    ).join('');
  }

  /** Build the bar shell (pills + content area) exactly once. */
  function _buildMarketShell() {
    const bar = document.getElementById('marketTickerBar');
    if (!bar) return;
    // Pre-fill content map with loading skeletons for every group
    Object.keys(MARKET_GROUPS).forEach(g => {
      if (!_mktContentMap[g]) _mktContentMap[g] = _mktSkeletonRows(g);
    });
    const pillsHtml = Object.keys(MARKET_GROUPS).map(g =>
      '<button class="market-group-btn' + (g === _activeGroup ? ' active' : '') + '" data-group="' + g + '">' + g + '</button>'
    ).join('');
    bar.innerHTML =
      '<div class="market-groups">' + pillsHtml + '</div>' +
      '<div id="marketContentArea" class="market-content-area visible">' + (_mktContentMap[_activeGroup] || '') + '</div>';
    _wireMarketPills();
  }

  /** Wire pill click handlers (called once after shell is built). */
  function _wireMarketPills() {
    if (_mktPillsWired) return;
    _mktPillsWired = true;
    const bar = document.getElementById('marketTickerBar');
    if (!bar) return;
    bar.addEventListener('click', e => {
      const btn = e.target.closest('.market-group-btn[data-group]');
      if (!btn) return;
      const g = btn.dataset.group;
      const contentArea = document.getElementById('marketContentArea');
      if (!contentArea) return;
      if (btn.classList.contains('active')) {
        // toggle off
        btn.classList.remove('active');
        contentArea.classList.remove('visible');
        _activeGroup = null;
      } else {
        document.querySelectorAll('.market-group-btn[data-group]').forEach(p =>
          p.classList.toggle('active', p.dataset.group === g)
        );
        contentArea.innerHTML = _mktContentMap[g] || _mktSkeletonRows(g);
        contentArea.classList.add('visible');
        _activeGroup = g;
      }
    });
  }

  /** Build one market-row HTML string from an index item object. */
  function _mktItemHtml(idx) {
    const price  = idx.price != null ? idx.price.toLocaleString('en-US', { maximumFractionDigits: 2, minimumFractionDigits: 2 }) : '—';
    const dayPct = idx.regularChangePct != null ? idx.regularChangePct : (idx.changePct != null ? idx.changePct : null);
    const dir    = dayPct == null ? 'flat' : dayPct > 0 ? 'up' : dayPct < 0 ? 'down' : 'flat';
    const arrow  = dir === 'up' ? '▲' : dir === 'down' ? '▼' : '●';
    const pctStr = dayPct != null ? (dayPct > 0 ? '+' : '') + dayPct.toFixed(2) + '%' : '';
    const tooltip = idx.label + (pctStr ? ' — ' + pctStr : '') + ' — ' + price;
    let afterHtml = '';
    try {
      const isAfter = idx.marketSession === 'extended' || (idx.extendedPrice != null && idx.regularPrice != null && idx.extendedPrice !== idx.regularPrice);
      if (isAfter) {
        const regular = Number.isFinite(+idx.regularPrice) ? +idx.regularPrice : null;
        const ext     = Number.isFinite(+idx.extendedPrice) ? +idx.extendedPrice : null;
        let extPct = null;
        if (ext != null && regular != null && regular !== 0) extPct = ((ext - regular) / regular) * 100;
        else if (idx.extendedChangePct != null)              extPct = +idx.extendedChangePct;
        if (extPct != null) {
          const extDir = extPct > 0 ? 'up' : extPct < 0 ? 'down' : 'flat';
          const extStr = (extPct > 0 ? '+' : '') + extPct.toFixed(2) + '%';
          afterHtml = '<div class="market-cell-after"><span class="after-hours-badge">AH <span class="after-hours-value ' + extDir + '">' + extStr + '</span></span></div>';
        } else {
          afterHtml = '<div class="market-cell-after"><span class="after-hours-badge">After Hours</span></div>';
        }
      }
    } catch (e) {}
    return '<div class="market-row" title="' + tooltip + '">'
      + '<div class="market-cell-label">'  + idx.label + '</div>'
      + '<div class="market-cell-price">'  + price     + '</div>'
      + '<div class="market-cell-chg mkt-chg ' + dir + '">' + (pctStr ? arrow + ' ' + pctStr : '') + '</div>'
      + afterHtml
      + '</div>';
  }

  /**
   * Update _mktContentMap for whichever groups have data in `indices`,
   * then refresh the content area if the active group changed.
   * Pills are NEVER rebuilt — only content is updated in-place.
   */
  function renderMarketTicker(indices) {
    if (!Array.isArray(indices) || indices.length === 0) return;
    const labelList = indices.filter(i => i && i.label != null).map(i => ({ label: String(i.label), item: i }));
    function findByLabel(lbl) {
      const exact = labelList.find(x => x.label === lbl);
      if (exact) return exact.item;
      const low = String(lbl).toLowerCase();
      const fuzzy = labelList.find(x => x.label.toLowerCase().includes(low) || low.includes(x.label.toLowerCase()));
      return fuzzy ? fuzzy.item : null;
    }
    let activeGroupUpdated = false;
    Object.keys(MARKET_GROUPS).forEach(g => {
      const items = MARKET_GROUPS[g].map(l => findByLabel(l)).filter(Boolean);
      if (items.length > 0) {
        _mktContentMap[g] = items.map(_mktItemHtml).join('');
        if (g === _activeGroup) activeGroupUpdated = true;
      }
    });
    // Refresh visible content area if the currently open tab just got real data
    if (activeGroupUpdated && _activeGroup) {
      const contentArea = document.getElementById('marketContentArea');
      if (contentArea) {
        contentArea.innerHTML = _mktContentMap[_activeGroup];
        contentArea.classList.add('visible');
      }
    }
  }

  async function loadMarketIndices() {
    // Build the tab shell once (all tabs visible immediately with loading rows).
    // On subsequent poll cycles the shell already exists; _buildMarketShell is cheap.
    _mktPillsWired = false; // re-wire after potential DOM re-render on refresh
    _buildMarketShell();
    try {
      const fetchOptions = getStocktwitsFetchOptions();
      // Stage 1 — US only: fast, fills the default active tab
      const usRes  = await fetch('/api/market-indices?group=US', fetchOptions);
      const usData = await usRes.json();
      if (usData.indices) renderMarketTicker(usData.indices);

      // Stage 2 — all groups: runs in background, updates each tab as data arrives
      fetch('/api/market-indices', fetchOptions)
        .then(r => r.json())
        .then(allData => { if (allData && allData.indices) renderMarketTicker(allData.indices); })
        .catch(() => {});
    } catch (e) {
      // keep skeleton on network failure
    }
  }

      );

      const counts = '<div class="sent-subrow">Bullish: <strong>' + (data.bullish||0) + '</strong> &nbsp; Bearish: <strong>' + (data.bearish||0) + '</strong> &nbsp; Neutral: <strong>' + (data.neutral||0) + '</strong></div>';
      const samples = (Array.isArray(data.sample) && data.sample.length > 0)

  function socialAuthPromptHtml(reason) {
    return '<div class="dimtext" style="margin-bottom:10px">' + escapeHtml(reason || 'Stocktwits auth required') + '</div>' +
      '<div style="display:grid;gap:8px;max-width:520px">' +
      '<input id="stocktwitsUsernameInput" type="text" placeholder="Stocktwits username" style="min-width:280px;padding:8px;border-radius:8px;border:1px solid #334155;background:#0b1018;color:#e2e8f0" />' +
      '<input id="stocktwitsPasswordInput" type="password" placeholder="Stocktwits password" style="min-width:280px;padding:8px;border-radius:8px;border:1px solid #334155;background:#0b1018;color:#e2e8f0" />' +
      '<input id="stocktwitsTokenInput" type="password" placeholder="Optional legacy token" style="min-width:280px;padding:8px;border-radius:8px;border:1px solid #334155;background:#0b1018;color:#e2e8f0" />' +
      '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">' +
      '<button id="saveStocktwitsAuthBtn" style="padding:8px 12px;border-radius:8px;border:1px solid #334155;background:#111827;color:#e2e8f0;cursor:pointer">Save & Retry</button>' +
      '<button id="clearStocktwitsAuthBtn" style="padding:8px 12px;border-radius:8px;border:1px solid #334155;background:#111827;color:#e2e8f0;cursor:pointer">Clear</button>' +
      '</div>' +
      '</div>' +
      '<div class="dimtext" style="margin-top:8px">Browser requests will send Authorization: Basic &lt;base64(username:password)&gt; to your local backend. Values are stored in local browser storage for this app.</div>';
  }

  function getStocktwitsUsername() {
    try { return localStorage.getItem('stocktwitsUsername') || ''; } catch (_) { return ''; }
  }

  function setStocktwitsUsername(username) {
    try {
      if (username) localStorage.setItem('stocktwitsUsername', username);
      else localStorage.removeItem('stocktwitsUsername');
    } catch (_) {}
  }

  function getStocktwitsPassword() {
    try { return localStorage.getItem('stocktwitsPassword') || ''; } catch (_) { return ''; }
  }

  function setStocktwitsPassword(password) {
    try {
      if (password) localStorage.setItem('stocktwitsPassword', password);
      else localStorage.removeItem('stocktwitsPassword');
    } catch (_) {}
  }

  function getStocktwitsToken() {
    try { return localStorage.getItem('stocktwitsToken') || ''; } catch (_) { return ''; }
  }

  function setStocktwitsToken(token) {
    try {
      if (token) localStorage.setItem('stocktwitsToken', token);
      else localStorage.removeItem('stocktwitsToken');
    } catch (_) {}
  }

  function getStocktwitsAuthorizationHeader() {
    const username = getStocktwitsUsername();
    const password = getStocktwitsPassword();
    if (!username || !password) return '';
    try {
      return 'Basic ' + btoa(username + ':' + password);
    } catch (_) {
      return '';
    }
  }

  function getStocktwitsFetchOptions() {
    const authorization = getStocktwitsAuthorizationHeader();
    return authorization ? { headers: { Authorization: authorization } } : {};
  }

  function getStocktwitsQueryString() {
    const token = getStocktwitsToken();
    return token ? ('?token=' + encodeURIComponent(token)) : '';
  }

  async function registerStocktwitsDefaultAuth() {
    const payload = {
      username: getStocktwitsUsername(),
      password: getStocktwitsPassword(),
      token: getStocktwitsToken()
    };
    const hasAnyAuth = payload.token || (payload.username && payload.password);
    if (!hasAnyAuth) return { ok: true, skipped: true };
    const res = await fetch('/api/social/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    return res.json();
  }

  async function clearStocktwitsDefaultAuth() {
    try {
      await fetch('/api/social/auth', { method: 'DELETE' });
    } catch (_) {}
  }

  function wireSocialAuthPrompt() {
    const userInput = document.getElementById('stocktwitsUsernameInput');
    const passwordInput = document.getElementById('stocktwitsPasswordInput');
    const tokenInput = document.getElementById('stocktwitsTokenInput');
    const saveBtn = document.getElementById('saveStocktwitsAuthBtn');
    const clearBtn = document.getElementById('clearStocktwitsAuthBtn');
    if (userInput) userInput.value = getStocktwitsUsername();
    if (passwordInput) passwordInput.value = getStocktwitsPassword();
    if (tokenInput) tokenInput.value = getStocktwitsToken();
    if (saveBtn) {
      saveBtn.onclick = async () => {
        setStocktwitsUsername(String(userInput?.value || '').trim());
        setStocktwitsPassword(String(passwordInput?.value || '').trim());
        setStocktwitsToken(String(tokenInput?.value || '').trim());
        await registerStocktwitsDefaultAuth();
        await loadStocktwitsTrending();
        await loadMarketIndices();
        await loadSocialForCurrentTicker();
      };
    }
    if (clearBtn) {
      clearBtn.onclick = async () => {
        setStocktwitsUsername('');
        setStocktwitsPassword('');
        setStocktwitsToken('');
        await clearStocktwitsDefaultAuth();
        if (userInput) userInput.value = '';
        if (passwordInput) passwordInput.value = '';
        if (tokenInput) tokenInput.value = '';
      };
    }
  }

  function wireTrendingSocialSymbols() {
    const buttons = document.querySelectorAll('[data-social-symbol]');
    buttons.forEach((btn) => {
      btn.onclick = () => {
        const s = btn.getAttribute('data-social-symbol');
        if (!s) return;
        tickerInput.value = s;
        doSearch();
      };
    });
  }

  function escapeHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;');
  }

  /* ── live price update ── */
  function updatePrice(price, currency, prevClose) {
    const pe = document.getElementById('priceValue');
    const be = document.getElementById('pctChange');
    if (!pe||!be) return;
    if (currency) _cur = currency;
    if (Number.isFinite(prevClose)) _prevClose = prevClose;
    pe.textContent = (_cur?_cur+' ':'')+fv(price);
    if (!_prevClose) { be.textContent='\u2014'; be.className='pct-badge pct-neutral'; return; }
    const pct = ((price-_prevClose)/_prevClose)*100;
    be.textContent = (pct>0?'\u25b2 ':pct<0?'\u25bc ':'')+Math.abs(pct).toFixed(2)+'%';
    be.className = 'pct-badge '+(pct>0?'pct-positive':pct<0?'pct-negative':'pct-neutral');
  }

  function startPolling(sym) {
    if (_poll) clearInterval(_poll);
    _poll = setInterval(() => {
      fetch('/api/ticker/'+encodeURIComponent(sym))
        .then(r=>r.json()).then(d=>{
          const p=+d.regularMarketPrice;
          if(Number.isFinite(p)) updatePrice(p,d.currency,+d.previousClose);
        }).catch(()=>{});
    }, 5000);
  }

  /* ── tab wiring ── */
  function wireTabs() {
    const btns = document.querySelectorAll('.tab-btn');

    function getArea() {
      return document.getElementById('tab-content-area');
    }

    async function showTab(id, btn) {
      const area = getArea();
      if (!area) return;
      btns.forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      const tabMap = window._tabContentMap || {};
      area.innerHTML = tabMap[id] || '<p class="dimtext">No content for this tab.</p>';
      area.style.display = 'block';
      if (id === 'news') await loadNewsForCurrentTicker();
      if (id === 'social') await loadSocialForCurrentTicker();
      if (id === 'recommendation') await loadRecommendationForCurrentTicker();
      if (id === 'options') await loadTickerOptionsForCurrentTicker();
    }

    btns.forEach(btn => btn.addEventListener('click', async () => {
      const id       = btn.dataset.tab;
      const isActive = btn.classList.contains('active');
      if (isActive) {
        btn.classList.remove('active');
        const area = getArea();
        if (area) area.style.display = 'none';
        return;
      }
      await showTab(id, btn);
    }));

    // expose for auto-open
    wireTabs._show = showTab;
  }

  /* ── main search ── */
  async function doSearch() {
    const sym = tickerInput.value.trim().toUpperCase();
    if (!sym || inFlight) return;
    if (_poll) { clearInterval(_poll); _poll=null; }
    _currentTicker = sym;
    _currentCompanyName = '';
    _currentEarningsDate = null;
    _newsLoadedFor = '';
    _newsLoading = false;
    _recommendationLoadedFor = '';
    _recommendationTrack = '';
    _recommendationHorizon = 'all';
    _recommendationCache = {};
    _tickerOptionsLoadedFor = '';
    _prevClose=null; _cur='';
    setLoading(true);
    resultEl.innerHTML = '<div class="loading-msg">Fetching '+sym+'\u2026</div>';
    try {
      const res  = await fetch('/api/ticker/'+encodeURIComponent(sym));
      const data = await res.json();
      if (data.error) { resultEl.innerHTML='<p style="color:#f87171;padding:20px 0">'+data.error+'</p>'; return; }
      const resolvedSym = (data && data.symbol) ? String(data.symbol).toUpperCase() : sym;
      _currentTicker = resolvedSym;
      const tv = data.tradingView||{};
      const displayCompanyName = stripCompanySuffixes(data.shortName);
      _currentCompanyName = displayCompanyName;
      // earningsDate may be an ISO string or a unix timestamp (seconds)
      if (data.earningsDate) {
        const _ed = typeof data.earningsDate === 'string' ? new Date(data.earningsDate).getTime() : +data.earningsDate * 1000;
        _currentEarningsDate = Number.isFinite(_ed) && _ed > 0 ? _ed : null;
      } else {
        _currentEarningsDate = null;
      }

      resultEl.innerHTML =
        /* Price card */
        '<div class="price-card">'+
          '<div class="company-name"><span class="ticker-sym">'+resolvedSym+'</span>'+(displayCompanyName?'<span class="name-sep">\u00b7</span><span>'+displayCompanyName+'</span>':'')+'</div>'+
          '<div class="price-row">'+
            '<span id="priceValue" class="price-big">\u2014</span>'+
            '<span id="pctChange"  class="pct-badge pct-neutral">\u2014</span>'+
            '<span id="afterHoursInfo"></span>'+
          '</div>'+
          '<div class="price-meta">'+
            '<span class="meta-chip"><span class="meta-label">Mkt Cap</span><span class="meta-value">'+fM(data.marketCap)+'</span></span>'+
            '<span class="meta-chip"><span class="meta-label">Prev Close</span><span class="meta-value">'+fv(data.previousClose)+'</span></span>'+
            '<span class="meta-chip"><span class="meta-label">Currency</span><span class="meta-value">'+(data.currency||'\u2014')+'</span></span>'+
            '<span class="meta-chip"><span class="meta-label">52W High</span><span class="meta-value meta-high">'+fv(data.fiftyTwoWeekHigh)+'</span></span>'+
            '<span class="meta-chip"><span class="meta-label">52W Low</span><span class="meta-value meta-low">'+fv(data.fiftyTwoWeekLow)+'</span></span>'+
            '<span class="meta-chip"><span class="meta-label">Earnings</span><span class="meta-value">'+fDate(data.earningsDate)+'</span></span>'+
          '</div>'+
        '</div>'+

        /* Tab buttons */
        '<div class="tabs-row">'+
          '<button class="tab-btn" data-tab="fundamentals"><span class="tab-icon">\ud83d\udcca</span> Fundamentals</button>'+
          '<button class="tab-btn" data-tab="technicals"><span class="tab-icon">\ud83d\udcc8</span> Technicals</button>'+
          '<button class="tab-btn" data-tab="consensus"><span class="tab-icon">\ud83c\udfaf</span> Consensus</button>'+
          '<button class="tab-btn" data-tab="recommendation"><span class="tab-icon">\ud83d\uddc2</span> Recommendation</button>'+
          '<button class="tab-btn" data-tab="news"><span class="tab-icon">\ud83d\udcf0</span> News</button>'+
          '<button class="tab-btn" data-tab="social"><span class="tab-icon">\ud83d\udcac</span> Social Sentiment</button>'+
          '<button class="tab-btn" data-tab="options"><span class="tab-icon">\u26a1</span> Options</button>'+
        '</div>'+

        /* Single shared tab content area */
        '<div id="tab-content-area" class="panel-inner" style="display:none;margin-top:8px"></div>';

      // Pre-build content for each tab and store in a map for instant switching
      window._tabContentMap = {
        fundamentals:
          '<div class="panel-label">Fundamentals</div><div class="grid">'+
            m('Forward P/E',fv(data.forwardPE))+m('PEG',fv(data.peg))+
            m('EV / EBITDA',fv(data.evEbitda))+m('Enterprise Value',fM(data.enterpriseValue))+
            m('EBITDA',fM(data.ebitda))+m('Total Revenue',fB(data.totalRevenue))+
            m('Free Cash Flow',fB(data.freeCashflow))+m('Op. Cash Flow',fB(data.operatingCashflow))+
            m('Dividend Yield',frt(data.dividendYield))+m('FCF Yield',frt(data.fcfYield))+m('FCF Margin',frt(data.fcfMargin))+
            m('OCF Margin',frt(data.ocfMargin))+m('Debt / Equity',fv(data.debtToEquity))+
            m('Market Cap',fM(data.marketCap))+
          '</div>',
        technicals:
          '<div class="panel-label">Technicals</div><div class="grid">'+
            m('RSI',fv(tv.rsi))+m('MA 50',tv.ma50?fv(tv.ma50):'N/A')+m('MA 200',tv.ma200?fv(tv.ma200):'N/A')+
            m('52-W High',fv(data.fiftyTwoWeekHigh))+m('52-W Low',fv(data.fiftyTwoWeekLow))+m('Beta',fv(data.beta))+
          '</div>'+(tv.error?'<p class="dimtext" style="margin-top:12px">TradingView unavailable</p>':''),
        consensus:
          '<div class="panel-label">Consensus</div><div class="grid">'+
            m('Rating',fR(tv.ratingLabel,tv.ratingScore))+
            m('Avg Price Target',fv(data.avgPriceTarget))+m('High Target',fv(data.highPriceTarget))+m('Low Target',fv(data.lowPriceTarget))+
          '</div>',
        recommendation:
          '<div class="panel-label">Recommendation</div>'+
          '<div id="recommendationContainer"><p class="dimtext">Open this tab to build the options recommendation scorecard.</p></div>',
        news:
          '<div class="panel-label">News</div>'+
          '<div id="newsContainer"><p class="dimtext">Loading…</p></div>',
        social:
          '<div class="panel-label">Social Sentiment</div>'+
          '<div id="socialContainer"><p class="dimtext">Loading…</p></div>',
        options:
          '<div class="panel-label">Options</div>'+
          '<div id="tickerOptionsContainer"><p class="dimtext">Open this tab to load latest options chain.</p></div>'
      };

      async function loadAndRenderSentiment(sym) {
        try {
          const res = await fetch('/api/compare/' + encodeURIComponent(sym));
          if (!res.ok) return;
          const j = await res.json();
          const comps = j.comparisons || {};
          const parts = [];
          const sentimentClass = (s) => s === 'UP' ? 'delta-up' : s === 'DOWN' ? 'delta-down' : 'delta-neutral';
          const fmtPct = (n) => {
            if (n == null || !Number.isFinite(n)) return '';
            const abs = Math.abs(n);
            if (abs > 999) return (n < 0 ? '-' : '') + '999%+';
            return (n > 0 ? '+' : '') + Number(n).toFixed(2) + '%';
          };
          function add(label, key, fmt) {
            const c = comps[key];
            if (!c) return;
            const isLowerBetter = key === 'forwardPE' || key === 'evEbitda';
            const val = (c.value == null) ? 'N/A' : (fmt ? fmt(c.value) : String(c.value));
            // Always use 5yr stock historical deviation for thumb — fall back to deviationPct only if stockHistAvg is missing
            const histDev = c.deviationFromStockHistPct != null ? Number(Number(c.deviationFromStockHistPct).toFixed(2)) : null;
            const dev = histDev ?? (c.stockHistAvg == null && c.deviationPct != null ? Number(Number(c.deviationPct).toFixed(2)) : null);
            const rel = fmtPct(dev);
            // Use the deviation sign for wording
            const direction = (dev != null) ? (dev < 0 ? 'below' : dev > 0 ? 'above' : 'near') : '';
            const displaySentiment = (dev == null)
              ? 'AVERAGE'
              : (isLowerBetter
                ? (dev < 0 ? 'UP' : dev > 0 ? 'DOWN' : 'AVERAGE')
                : (dev > 0 ? 'UP' : dev < 0 ? 'DOWN' : 'AVERAGE'));
            const devClass = sentimentClass(displaySentiment);
            const histWindow = c.stockHistWindow || '5yr';
            const baselineLabel = c.stockHistAvg != null ? `vs ${histWindow} avg` : '';
            const note = rel ? ` — <span class="${devClass}" title="vs ${histWindow} stock historical average">` + rel + ' ' + direction + (baselineLabel ? ' ' + baselineLabel : '') + '</span>' : '';
            const emoji = displaySentiment === 'UP' ? '👍' : displaySentiment === 'DOWN' ? '👎' : '➡️';
            parts.push('<div class="sent-row"><strong>' + label + '</strong><div>' + emoji + '<span style="margin-left:8px">' + val + note + '</span></div></div>');
            // Show stock historical avg as the primary reference; sector avg is secondary
            const histStockVal = c.stockHistAvg != null ? (fmt ? fmt(c.stockHistAvg) : String(c.stockHistAvg)) : 'N/A';
            parts.push('<div class="sent-subrow">' + histWindow + ' historical avg: <strong>' + histStockVal + '</strong></div>');
            const sectorVal = c.sectorAvg != null ? (fmt ? fmt(c.sectorAvg) : String(c.sectorAvg)) : 'N/A';
            parts.push('<div class="sent-subrow">Sector avg: <strong>' + sectorVal + '</strong></div>');
          }
          add('Forward P/E', 'forwardPE', v => Number.isFinite(v) ? v.toFixed(2) + 'x' : String(v));
          add('EV/EBITDA', 'evEbitda', v => Number.isFinite(v) ? v.toFixed(2) + 'x' : String(v));
          add('FCF Margin', 'fcfMargin', v => Number.isFinite(v) ? (v * 100).toFixed(2) + '%' : String(v));

          if (parts.length > 0) {
            const sentimentHtml = '<div class="panel-label">Historical and Sector Comparison</div>' + parts.join('');
            // Prepend sentiment section to fundamentals content
            window._tabContentMap.fundamentals = sentimentHtml + window._tabContentMap.fundamentals;
            if (document.querySelector('.tab-btn.active')?.dataset?.tab === 'fundamentals') {
              const area = document.getElementById('tab-content-area');
              if (area) area.innerHTML = window._tabContentMap.fundamentals;
            }
          }
        } catch (e) {
          // silent
        }
      }

      const regularNow = Number.isFinite(+data.regularPrice) ? +data.regularPrice : +data.regularMarketPrice;
      if (Number.isFinite(regularNow)) updatePrice(regularNow, data.currency, +data.previousClose);

      // Populate after-hours badge and percent when extended price is present
      try {
        const afterEl = document.getElementById('afterHoursInfo');
        if (afterEl) {
          const isAfterHours = data.marketSession === 'extended';
          const regular = Number.isFinite(+data.regularMarketPrice) ? +data.regularMarketPrice : null;
          const ext = Number.isFinite(+data.extendedPrice) ? +data.extendedPrice : (Number.isFinite(+data.postMarketPrice) ? +data.postMarketPrice : (Number.isFinite(+data.preMarketPrice) ? +data.preMarketPrice : null));
          // After-hours percent is always computed against regular close.
          let extPct = null;
          if (ext != null && regular != null && regular !== 0) extPct = ((ext - regular) / regular) * 100;

          if (isAfterHours && ext != null && extPct != null && regular != null && regular !== 0 && ext !== regular) {
            const cls    = extPct > 0 ? 'up' : extPct < 0 ? 'down' : 'flat';
            const extFmt = ext.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            const pctFmt = (extPct > 0 ? '+' : '') + extPct.toFixed(2) + '%';
            afterEl.innerHTML =
              '<span class="after-hours-badge">' +
                'After Hrs&nbsp;<span class="after-hours-value ' + cls + '">' + extFmt + '</span>' +
                '&nbsp;<span class="after-hours-value ' + cls + '" style="font-size:0.82em;opacity:0.85">(' + pctFmt + ')</span>' +
              '</span>';
          } else {
            afterEl.innerHTML = '';
          }
        }
      } catch (e) { /* silent */ }
      startPolling(resolvedSym);
      wireTabs();
      // auto-open Fundamentals so content is immediately visible
      const firstBtn = document.querySelector('.tab-btn[data-tab="fundamentals"]');
      if (wireTabs._show) wireTabs._show('fundamentals', firstBtn);
      // Load sentiment and inject into fundamentals panel
      loadAndRenderSentiment(resolvedSym);
    } catch(e) {
      resultEl.innerHTML='<p style="color:#f87171;padding:20px 0">'+e.message+'</p>';
    } finally { setLoading(false); }
  }

  fetchBtn.addEventListener('click', doSearch);
  tickerInput.addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch(); });
  registerStocktwitsDefaultAuth().catch(() => {});
  wireInsightsStripButtons();
  loadMarketIndices();
  setInterval(loadMarketIndices, 5 * 60 * 1000);
  loadOverallHeadlines();
  setInterval(loadOverallHeadlines, 5 * 60 * 1000);
  
  // Load earnings and trending together early
  (async () => {
    try {
      console.log('[init] Loading earnings and trending...');
      await Promise.all([
        loadEarningsWeek(),
        loadStocktwitsTrending()
      ]);
      console.log('[init] Both data sources loaded, earnings sections:', _earningsStripSections.length);
    } catch (e) {
      console.error('[init] Error loading initial data:', e);
    }
  })();
  
  setInterval(loadStocktwitsTrending, 5 * 60 * 1000);
  setInterval(loadEarningsWeek, 30 * 60 * 1000);
  loadActiveOptions();
  setInterval(loadActiveOptions, 60 * 60 * 1000);
  // Auto-refresh ticker data every 5 minutes if a symbol is loaded
  setInterval(async () => {
    if (!_currentTicker || inFlight) return;
    const activeTabId = document.querySelector('.tab-btn.active')?.dataset?.tab || null;
    tickerInput.value = _currentTicker;
    _newsLoadedFor = '';
    await doSearch();
    if (activeTabId) {
      setTimeout(() => document.querySelector('.tab-btn[data-tab="'+activeTabId+'"]')?.click(), 200);
    }
  }, 5 * 60 * 1000);

  /* ── Global floating tooltip ── */
  (function () {
    const tip = document.createElement('div');
    tip.id = 'g-tip';
    document.body.appendChild(tip);

    let _current = null;

    document.addEventListener('mouseover', function (e) {
      const wrap = e.target.closest('[data-tip]');
      if (!wrap) {
        if (_current) { tip.style.display = 'none'; _current = null; }
        return;
      }
      _current = wrap;
      tip.textContent = wrap.dataset.tip || '';
      tip.style.display = 'block';
    });

    document.addEventListener('mousemove', function (e) {
      if (!_current) return;
      let x = e.clientX + 14, y = e.clientY - 14;
      tip.style.left = x + 'px';
      tip.style.top  = y + 'px';
      const r = tip.getBoundingClientRect();
      if (r.right  > window.innerWidth  - 8) tip.style.left = (e.clientX - r.width - 14) + 'px';
      if (r.bottom > window.innerHeight - 8) tip.style.top  = (e.clientY - r.height - 14) + 'px';
    });

    document.addEventListener('mouseout', function (e) {
      if (!_current) return;
      if (!_current.contains(e.relatedTarget)) {
        tip.style.display = 'none';
        _current = null;
      }
    });
  }());

</script>
</body>
</html>
